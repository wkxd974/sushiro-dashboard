<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>餐饮竞品数据看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;display:flex}

/* === Sidebar === */
.sidebar{width:220px;min-height:100vh;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%);color:#fff;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar .logo{padding:18px 16px 12px;font-size:17px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);letter-spacing:1px}
.sidebar .logo span{font-size:11px;opacity:.6;display:block;margin-top:3px;font-weight:400}
.nav-section{padding:10px 0}
.nav-header{padding:6px 16px;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35);font-weight:600}
.nav-item{padding:9px 16px 9px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:8px;transition:all .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(231,76,60,.25);color:#e74c3c;font-weight:600;border-right:3px solid #e74c3c}
.nav-item.active-blue{background:rgba(52,152,219,.2);color:#3498db;font-weight:600;border-right:3px solid #3498db}
.nav-sub{padding-left:12px}
.nav-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 16px}

/* === Main === */
.main-wrap{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:#fff;padding:10px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 3px rgba(0,0,0,.06);position:sticky;top:0;z-index:50}
.topbar h2{font-size:15px;font-weight:600;color:#333}
.topbar .actions{display:flex;gap:8px;align-items:center}
.topbar button{padding:5px 14px;border:1px solid #d9d9d9;background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:#555}
.topbar button:hover{border-color:#e74c3c;color:#e74c3c}
.content{padding:16px 24px;max-width:1360px;margin:0 auto}
.tabs{display:flex;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px}
.tab{flex:1;text-align:center;padding:11px 8px;cursor:pointer;font-size:13px;font-weight:500;color:#888;border-bottom:2.5px solid transparent;user-select:none}
.tab:hover{color:#e74c3c;background:#fef5f5}
.tab.active{color:#e74c3c;border-bottom-color:#e74c3c;background:#fef5f5}
.tab.blue:hover{color:#3498db;background:#f0f7ff}
.tab.blue.active{color:#3498db;border-bottom-color:#3498db;background:#f0f7ff}
.filters{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:11px;color:#888;font-weight:500}
.fg select,.fg input[type=date]{padding:6px 10px;border:1px solid #d9d9d9;border-radius:6px;font-size:12px;outline:none;min-width:120px}
.fg select:focus,.fg input:focus{border-color:#e74c3c}
.finfo{margin-left:auto;font-size:11px;color:#aaa}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:12px}
.kpi{background:#fff;border-radius:8px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-left:4px solid #e74c3c}
.kpi:nth-child(2){border-left-color:#e67e22}
.kpi:nth-child(3){border-left-color:#3498db}
.kpi:nth-child(4){border-left-color:#2ecc71}
.kpi:nth-child(5){border-left-color:#9b59b6}
.kpi:nth-child(6){border-left-color:#1abc9c}
.kpi .kl{font-size:11px;color:#999;margin-bottom:4px}
.kpi .kv{font-size:22px;font-weight:700}
.kpi .ks{font-size:10px;color:#aaa;margin-top:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.card{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:12px}
.card h3{font-size:13px;font-weight:600;margin-bottom:10px;color:#333}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafafa;padding:8px 10px;text-align:left;font-weight:600;color:#666;border-bottom:2px solid #f0f0f0;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #f0f0f0;white-space:nowrap}
tr:hover td{background:#fef5f5}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.bg-g{background:#f6ffed;color:#52c41a}.bg-o{background:#fff7e6;color:#fa8c16}.bg-r{background:#fff2f0;color:#f5222d}.bg-b{background:#e6f7ff;color:#1890ff}
.hidden{display:none!important}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:8px;font-size:11px;color:#666}
.legend span{display:flex;align-items:center;gap:3px}
.tooltip{position:absolute;background:rgba(0,0,0,.85);color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;pointer-events:none;z-index:999;white-space:nowrap;display:none}
.scroll-table{overflow-x:auto;max-height:500px;overflow-y:auto}
.scroll-table thead th{position:sticky;top:0;z-index:2;background:#fafafa}
.loading{text-align:center;padding:60px;color:#999}
.loading .spin{display:inline-block;width:24px;height:24px;border:3px solid #eee;border-top-color:#e74c3c;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.matrix-cell{display:inline-block;width:18px;height:18px;border-radius:3px;margin:1px;font-size:8px;text-align:center;line-height:18px;color:#fff;cursor:pointer}
.heatmap-row{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.heatmap-label{width:60px;font-size:10px;text-align:right;margin-right:4px;color:#666;flex-shrink:0}
@media(max-width:900px){.sidebar{width:180px}.main-wrap{margin-left:180px}.g2{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{display:none}.main-wrap{margin-left:0}}

<script>
// === Config ===
var SUPA_URL = 'https://wvqvrefqtvjohersxviv.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind2cXZyZWZxdHZqb2hlcnN4dml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MjM4MzUsImV4cCI6MjA4OTM5OTgzNX0.kt_Xf6vK_Ulhkfb_izEDM9Vd8JXSaPxCK9y8ojiQKNQ';
var BRANDS = ["三出山", "八合里", "左庭右院", "朱光玉", "朱富贵", "潮发", "芈重山"];
var COLORS = ['#e74c3c','#3498db','#2ecc71','#e67e22','#9b59b6','#1abc9c','#f39c12','#e84393','#00b894','#6c5ce7','#fd79a8','#00cec9'];
var BRAND_COLORS = {};
BRANDS.forEach(function(b,i){ BRAND_COLORS[b] = COLORS[i % COLORS.length]; });

// === Data stores ===
var sushiroCityData=[], sushiroStoreData=[], sushiroDailyData=[];
var hpBrandData=[], hpCityData=[], hpStoreData=[];
var curSection='sushiro', curSTab='s_city', curHpSumTab='hps_queue';
var curHpBrandTab = {}; // per brand
BRANDS.forEach(function(b){ curHpBrandTab['hp_'+b] = 'queue'; });

// === Supabase fetch (single page, max 1000) ===
function supa(table, params) {
  var url = SUPA_URL + '/rest/v1/' + table + '?select=*' + (params||'');
  return fetch(url, {
    headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
  }).then(function(r){ return r.json(); });
}

// === Paginated fetch for large tables (auto-paginates past 1000-row limit) ===
function supaAll(table, order) {
  var PAGE = 1000;
  function fetchPage(offset) {
    var url = SUPA_URL + '/rest/v1/' + table + '?select=*&order=' + order + '&limit=' + PAGE + '&offset=' + offset;
    return fetch(url, {
      headers: {'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY}
    }).then(function(r){ return r.json(); });
  }
  return fetchPage(0).then(function(first) {
    if(!Array.isArray(first)) return [];
    if(first.length < PAGE) return first;
    // Need more pages
    var pages = [];
    var total = first.length;
    // Estimate: fetch up to 50 pages (50k rows max)
    function nextPage(offset, acc) {
      return fetchPage(offset).then(function(data) {
        if(!Array.isArray(data) || !data.length) return acc;
        acc = acc.concat(data);
        if(data.length < PAGE) return acc;
        return nextPage(offset + PAGE, acc);
      });
    }
    return nextPage(PAGE, first);
  });
}

// === SVG Tools ===
function svgEl(t,a,txt){var e=document.createElementNS('http://www.w3.org/2000/svg',t);if(a)Object.keys(a).forEach(function(k){e.setAttribute(k,a[k]);});if(txt!==undefined)e.textContent=txt;return e;}
function mkSvg(w,h){var s=svgEl('svg',{width:'100%',height:h,viewBox:'0 0 '+w+' '+h,preserveAspectRatio:'xMidYMid meet'});s.style.display='block';return s;}
function showTip(e,t){var tt=document.getElementById('tt');tt.textContent=t;tt.style.display='block';tt.style.left=(e.pageX+10)+'px';tt.style.top=(e.pageY-28)+'px';}
function hideTip(){document.getElementById('tt').style.display='none';}

function fmtInt(v){return v==null?'-':Math.round(v).toLocaleString();}
function fmtPct(v){return v==null?'-':(v*100).toFixed(1)+'%';}
function fmtRate(v){return v==null?'-':(+v).toFixed(1);}
function fmtMoney(v){return v==null?'-':'¥'+Math.round(v).toLocaleString();}

function drawBarH(container,items,valKey,labelKey,fmtFn,color){
  if(!items.length){container.innerHTML='<div style="color:#999;text-align:center;padding:30px">暂无数据</div>';return;}
  var W=560,barH=26,gap=4,pad={l:90,r:55,t:5,b:5};var H=pad.t+items.length*(barH+gap)+pad.b;var svg=mkSvg(W,H);
  var mx=Math.max.apply(null,items.map(function(d){return d[valKey]||0;}))||1;var cw=W-pad.l-pad.r;
  items.forEach(function(d,i){var y=pad.t+i*(barH+gap);var w=((d[valKey]||0)/mx)*cw;
  var c;
  if(color){
    // Single color or gradient: darken to lighten based on rank
    var t=items.length>1?i/(items.length-1):0;
    var opacity=1-t*0.55;// top bar full color, bottom bar 45% opacity
    c=color;d._barOpacity=opacity;
  } else {
    c=COLORS[i%COLORS.length];d._barOpacity=0.85;
  }
  var lbl=d[labelKey]||'';if(lbl.length>7)lbl=lbl.substring(0,7)+'…';
  svg.appendChild(svgEl('text',{x:pad.l-6,y:y+barH/2+4,'text-anchor':'end','font-size':11,fill:'#333'},lbl));
  var rect=svgEl('rect',{x:pad.l,y:y,width:Math.max(w,2),height:barH,rx:3,fill:c,opacity:d._barOpacity||.85,style:'cursor:pointer'});
  rect.addEventListener('mouseenter',function(e){showTip(e,d[labelKey]+': '+(fmtFn?fmtFn(d[valKey]):d[valKey]));});
  rect.addEventListener('mouseleave',hideTip);svg.appendChild(rect);
  svg.appendChild(svgEl('text',{x:pad.l+w+4,y:y+barH/2+4,'font-size':10,fill:'#666'},fmtFn?fmtFn(d[valKey]):String(Math.round(d[valKey]||0))));});
  container.innerHTML='';container.appendChild(svg);
}

function drawGroupedBar(container, brands, vals, labelKey) {
  if(!brands.length){container.innerHTML='<div style="color:#999;text-align:center;padding:30px">暂无数据</div>';return;}
  var W=600,barH=22,gap=3,groupGap=10,pad={l:70,r:60,t:5,b:5};
  var keys=Object.keys(vals);var nk=keys.length;
  var groupH=nk*(barH+gap)+groupGap;
  var H=pad.t+brands.length*groupH+pad.b;var svg=mkSvg(W,H);
  var mx=0;keys.forEach(function(k){vals[k].forEach(function(v){if(v>mx)mx=v;});});if(!mx)mx=1;
  var cw=W-pad.l-pad.r;
  
  brands.forEach(function(b,bi){
    var gy=pad.t+bi*groupH;
    var lbl=b;if(lbl.length>5)lbl=lbl.substring(0,5)+'…';
    svg.appendChild(svgEl('text',{x:pad.l-6,y:gy+groupH/2,'text-anchor':'end','font-size':11,fill:'#333',dy:'.35em'},lbl));
    keys.forEach(function(k,ki){
      var y=gy+ki*(barH+gap);var v=vals[k][bi]||0;var w=(v/mx)*cw;
      var c=BRAND_COLORS[k]||COLORS[ki%COLORS.length];
      svg.appendChild(svgEl('rect',{x:pad.l,y:y,width:Math.max(w,2),height:barH,rx:3,fill:c,opacity:.8}));
      svg.appendChild(svgEl('text',{x:pad.l+w+4,y:y+barH/2+4,'font-size':10,fill:'#666'},fmtInt(v)));
    });
  });
  container.innerHTML='';container.appendChild(svg);
}

function drawLineChart(container,data,keys,colors,labels,opts){
  opts=opts||{};if(!data.length||!keys.length){container.innerHTML='<div style="color:#999;text-align:center;padding:30px">暂无数据</div>';return;}
  var W=600,H=240,pad={t:15,r:50,b:35,l:55};var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;var svg=mkSvg(W,H);
  var allV=[];keys.forEach(function(k){data.forEach(function(d){if(d[k]!=null&&!isNaN(d[k]))allV.push(+d[k]);});});
  if(!allV.length){container.innerHTML='';return;}
  var mn=Math.min.apply(null,allV)*.9,mx=Math.max.apply(null,allV)*1.1;if(mn===mx){mn-=1;mx+=1;}
  var xStep=data.length>1?cw/(data.length-1):cw;
  var yS=function(v){return pad.t+ch-((v-mn)/(mx-mn))*ch;};
  for(var i=0;i<5;i++){var y=pad.t+ch*i/4;svg.appendChild(svgEl('line',{x1:pad.l,y1:y,x2:W-pad.r,y2:y,stroke:'#f0f0f0'}));
  var v=mx-(mx-mn)*i/4;svg.appendChild(svgEl('text',{x:pad.l-6,y:y+3,'text-anchor':'end','font-size':9,fill:'#999'},opts.yFmt?opts.yFmt(v):v.toFixed(1)));}
  var step=Math.max(1,Math.floor(data.length/10));
  data.forEach(function(d,i){if(i%step===0||i===data.length-1){svg.appendChild(svgEl('text',{x:pad.l+i*xStep,y:H-pad.b+14,'text-anchor':'middle','font-size':9,fill:'#999',transform:'rotate(-20,'+( pad.l+i*xStep)+','+(H-pad.b+14)+')'},d._label||''));}});
  keys.forEach(function(k,ki){var pts=[];data.forEach(function(d,i){if(d[k]!=null&&!isNaN(d[k]))pts.push({x:pad.l+i*xStep,y:yS(+d[k]),v:+d[k],l:d._label||''});});
  if(!pts.length)return;
  if(pts.length>=2){var pathD=pts.map(function(p,i){return(i===0?'M':'L')+p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ');
  svg.appendChild(svgEl('path',{d:pathD,fill:'none',stroke:colors[ki],'stroke-width':2}));}
  pts.forEach(function(p){var c=svgEl('circle',{cx:p.x,cy:p.y,r:10,fill:'transparent',style:'cursor:pointer'});
  c.addEventListener('mouseenter',function(e){showTip(e,labels[ki]+': '+(opts.tipFmt?opts.tipFmt(p.v):p.v.toFixed(1))+' ('+p.l+')');});
  c.addEventListener('mouseleave',hideTip);svg.appendChild(svgEl('circle',{cx:p.x,cy:p.y,r:3.5,fill:colors[ki]}));svg.appendChild(c);});});
  container.innerHTML='';
  if(labels.length>1){var lg=document.createElement('div');lg.className='legend';labels.forEach(function(l,i){var s=document.createElement('span');s.innerHTML='<span class="dot" style="background:'+colors[i]+'"></span>'+l;lg.appendChild(s);});container.appendChild(lg);}
  container.appendChild(svg);
}

// Cache of daily dates grouped by month for quick lookup
var _dailyDatesByMonth = {};

function initSushiroFilters(){
  var months={},cities={};
  sushiroCityData.forEach(function(d){if(d.month)months[d.month]=1;if(d.city)cities[d.city]=1;});
  sushiroStoreData.forEach(function(d){if(d.month)months[d.month]=1;if(d.city)cities[d.city]=1;});
  // Also include months from daily data
  sushiroDailyData.forEach(function(d){if(d.date){var m=d.date.slice(0,7);months[m]=1;}if(d.city)cities[d.city]=1;});
  var ms=Object.keys(months).sort();var cs=Object.keys(cities).sort();
  var selM=document.getElementById('sfMonth');selM.innerHTML='<option>全部</option>';
  ms.forEach(function(m){selM.innerHTML+='<option>'+m+'</option>';});
  if(ms.length)selM.value=ms[ms.length-1];
  var selC=document.getElementById('sfCity');selC.innerHTML='<option>全部</option>';
  cs.forEach(function(c){selC.innerHTML+='<option>'+c+'</option>';});
  // Build daily dates index by month
  _dailyDatesByMonth={};
  sushiroDailyData.forEach(function(d){
    if(!d.date)return;var m=d.date.slice(0,7);
    if(!_dailyDatesByMonth[m])_dailyDatesByMonth[m]=[];
    if(_dailyDatesByMonth[m].indexOf(d.date)===-1)_dailyDatesByMonth[m].push(d.date);
  });
  Object.keys(_dailyDatesByMonth).forEach(function(m){_dailyDatesByMonth[m].sort();});
  // Set initial date range based on selected month
  syncDateRangeToMonth();
}

// When month dropdown changes: auto-set date range to that month's available dates
function onMonthChange(){
  var isDailyTab=(curSTab==='s_daily'||curSTab==='s_trend');
  if(isDailyTab) syncDateRangeToMonth();
  sRender();
}

// When user manually changes date pickers: update month selector to match
function onDateManualChange(){
  var from=document.getElementById('sfDateFrom').value;
  var to=document.getElementById('sfDateTo').value;
  var selM=document.getElementById('sfMonth');
  if(from && to){
    var mFrom=from.slice(0,7), mTo=to.slice(0,7);
    if(mFrom===mTo){
      // Both dates in same month: sync month selector
      var hasOpt=false;
      for(var i=0;i<selM.options.length;i++){if(selM.options[i].value===mFrom){hasOpt=true;break;}}
      if(hasOpt) selM.value=mFrom;
    } else {
      selM.value='全部';
    }
  }
  sRender();
}

// Sync dateFrom/dateTo to the selected month's available daily dates
function syncDateRangeToMonth(){
  var m=document.getElementById('sfMonth').value;
  if(m==='全部'){
    // Set to full available range
    var allDates=sushiroDailyData.map(function(d){return d.date;}).filter(Boolean).sort();
    if(allDates.length){
      document.getElementById('sfDateFrom').value=allDates[0];
      document.getElementById('sfDateTo').value=allDates[allDates.length-1];
    }
  } else {
    var dates=_dailyDatesByMonth[m];
    if(dates && dates.length){
      document.getElementById('sfDateFrom').value=dates[0];
      document.getElementById('sfDateTo').value=dates[dates.length-1];
    } else {
      // No daily data for this month, set to month boundaries
      document.getElementById('sfDateFrom').value=m+'-01';
      var y=parseInt(m.slice(0,4)),mo=parseInt(m.slice(5,7));
      var lastDay=new Date(y,mo,0).getDate();
      document.getElementById('sfDateTo').value=m+'-'+String(lastDay).padStart(2,'0');
    }
  }
}

function renderSTrend(f){
  var d=sushiroDailyData.filter(function(r){
    var mc=f.city==='全部'||r.city===f.city;
    var md=(!f.dateFrom||r.date>=f.dateFrom)&&(!f.dateTo||r.date<=f.dateTo);
    return mc&&md;
  });
  document.getElementById('sDataCount').textContent='趋势: '+d.length+' 条';
  var el=document.getElementById('sp-s_trend');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">所选日期范围内暂无数据（数据可能尚未入库）</div>';return;}
  var g={};d.forEach(function(r){
    if(!g[r.date])g[r.date]={_label:r.date.slice(5),rev:0,tables:0,qh:0,bh:0,n:0};
    g[r.date].rev+=(r.daily_sales_revenue||0);g[r.date].tables+=(r.daily_sales_tables||0);
    g[r.date].qh+=(r.queue_hours||0);g[r.date].bh+=(r.biz_hours||0);g[r.date].n++;
  });
  // Build complete date range from filter dates
  var allDates=Object.keys(g).sort();
  var startD=f.dateFrom||allDates[0], endD=f.dateTo||allDates[allDates.length-1];
  var fullDates=[];
  (function(){var cur=new Date(startD+'T00:00:00');var end=new Date(endD+'T00:00:00');while(cur<=end){var ds=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');fullDates.push(ds);cur.setDate(cur.getDate()+1);}})();
  var trend=fullDates.map(function(ds){var o=g[ds];if(o)return{_label:ds.slice(5),avgRev:o.n?o.rev/o.n:0,avgTables:o.n?o.tables/o.n:0,queuePct:o.bh?o.qh/o.bh:0,totalRev:o.rev,_hasData:true};return{_label:ds.slice(5),avgRev:null,avgTables:null,queuePct:null,totalRev:null,_hasData:false};});
  var missingDates=fullDates.filter(function(ds){return !g[ds];});
  var dataTip=missingDates.length>0?'<div style="background:#fff3e0;border:1px solid #ffe0b2;border-radius:6px;padding:8px 14px;margin-bottom:12px;font-size:12px;color:#e65100">⚠ 所选范围 '+fullDates.length+' 天中，'+allDates.length+' 天有数据，'+missingDates.length+' 天暂无数据（'+missingDates.map(function(d){return d.slice(5);}).join(', ')+'）</div>':'';
  el.innerHTML=dataTip+'<div class="g2">'
    +'<div class="card"><h3>日均单店销售桌数趋势</h3><div id="st1"></div></div>'
    +'<div class="card"><h3>日均单店销售净额趋势</h3><div id="st2"></div></div></div>'
    +'<div class="g2">'
    +'<div class="card"><h3>排队时段占比趋势</h3><div id="st3"></div></div>'
    +'<div class="card"><h3>每日总销售净额趋势</h3><div id="st4"></div></div></div>';
  drawLineChart(document.getElementById('st1'),trend,['avgTables'],[COLORS[0]],['日均单店销售桌数'],{tipFmt:function(v){return v.toFixed(0)+'桌';}});
  drawLineChart(document.getElementById('st2'),trend,['avgRev'],[COLORS[1]],['日均单店销售净额'],{tipFmt:fmtMoney,yFmt:function(v){return(v/10000).toFixed(0)+'万';}});
  drawLineChart(document.getElementById('st3'),trend,['queuePct'],[COLORS[2]],['排队时段占比'],{tipFmt:fmtPct});
  drawLineChart(document.getElementById('st4'),trend,['totalRev'],[COLORS[3]],['总销售净额'],{tipFmt:fmtMoney,yFmt:function(v){return(v/10000).toFixed(0)+'万';}});
}

function renderSExpand(f){
  // Sushiro expansion overview: city coverage matrix, scale overview, store changes
  var d=sushiroCityData.filter(function(r){return r.city!=='总计';});
  var el=document.getElementById('sp-s_expand');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  
  var months=[...new Set(d.map(function(r){return r.month;}))].sort();
  var cities=[...new Set(d.map(function(r){return r.city;}))].sort();
  
  // Build city-month matrix
  var cm={};d.forEach(function(r){cm[r.city+'|'+r.month]=r.store_count||0;});
  
  var matrixHtml='<div class="card"><h3>城市覆盖矩阵 ('+cities.length+' 城市 × '+months.length+' 月)</h3><div class="scroll-table"><table><thead><tr><th>城市</th>';
  months.forEach(function(m){matrixHtml+='<th>'+m+'</th>';});
  matrixHtml+='</tr></thead><tbody>';
  cities.forEach(function(c){
    matrixHtml+='<tr><td style="font-weight:600">'+c+'</td>';
    months.forEach(function(m){
      var v=cm[c+'|'+m]||0;
      var bg=v>0?'#e6f7ff':'#f5f5f5';
      matrixHtml+='<td style="background:'+bg+';text-align:center;font-weight:'+(v?'600':'400')+'">'+v+'</td>';
    });
    matrixHtml+='</tr>';
  });
  matrixHtml+='</tbody></table></div></div>';
  
  // Scale overview per latest month
  var latest=months[months.length-1]||'';
  var latestD=d.filter(function(r){return r.month===latest;});
  var totalS=latestD.reduce(function(s,r){return s+(r.store_count||0);},0);
  
  el.innerHTML='<div class="kpi-row">'
    +'<div class="kpi"><div class="kl">覆盖城市数</div><div class="kv">'+cities.length+'</div><div class="ks">截至 '+latest+'</div></div>'
    +'<div class="kpi"><div class="kl">总门店数</div><div class="kv">'+totalS+'</div><div class="ks">'+latest+'</div></div>'
    +'<div class="kpi"><div class="kl">数据月份</div><div class="kv">'+months.length+'</div></div>'
    +'</div>' + matrixHtml;
}

function hpSumTab(t){
  curHpSumTab=t;

  document.querySelectorAll('#hpSumTabs .tab').forEach(function(el,i){el.classList.toggle('active',tabs[i]===t);});

function hpSumRender(){

function renderHpSumQueue(fDate,fCity){
  // Use city-level data when a city is selected, brand-level when "全部"
  var d;
  if(fCity && fCity!=='全部'){
    d=hpCityData.filter(function(r){return (fDate==='全部'||r.date===fDate)&&r.city===fCity;});
  } else {
    d=hpBrandData.filter(function(r){return fDate==='全部'||r.date===fDate;});
  }
  var cityLabel=fCity&&fCity!=='全部'?' ('+fCity+')':'';
  document.getElementById('hpSumCount').textContent=d.length+' 条'+cityLabel;
  var el=document.getElementById('sp-hps_queue');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}

  // Aggregate by brand
  var bg={};d.forEach(function(r){
    if(!bg[r.brand])bg[r.brand]={brand:r.brand,total_queue:0,total_stores:0,stores_with_queue:0,days:0};
    bg[r.brand].total_queue+=(r.total_queue||0);
    bg[r.brand].total_stores+=(r.total_stores||r.store_count||0);
    bg[r.brand].stores_with_queue+=(r.stores_with_queue||r.queue_stores||0);
    bg[r.brand].days++;
  });
  var brands=Object.values(bg).sort(function(a,b){return b.total_queue-a.total_queue;});

  el.innerHTML='<div class="kpi-row">'
    +'<div class="kpi"><div class="kl">品牌数</div><div class="kv">'+brands.length+'</div></div>'
    +'<div class="kpi"><div class="kl">总排队号数'+cityLabel+'</div><div class="kv">'+fmtInt(brands.reduce(function(s,r){return s+r.total_queue;},0))+'</div></div>'
    +'<div class="kpi"><div class="kl">总门店数'+cityLabel+'</div><div class="kv">'+fmtInt(brands.reduce(function(s,r){return s+r.total_stores;},0)/Math.max(brands[0]?brands[0].days:1,1))+'</div><div class="ks">日均</div></div>'
    +'</div>'
    +'<div class="g2"><div class="card"><h3>品牌排队号数对比'+cityLabel+'</h3><div id="hpq1"></div></div>'
    +'<div class="card"><h3>品牌门店数对比'+cityLabel+'</h3><div id="hpq2"></div></div></div>'
    +'<div class="card"><h3>品牌排队汇总明细'+cityLabel+'</h3><div class="scroll-table"><table><thead><tr>'
    +'<th>品牌</th><th>数据天数</th><th>总排队号数</th><th>日均门店数</th><th>日均排队门店</th><th>日均排队号数</th>'
    +'</tr></thead><tbody id="hpqTbl"></tbody></table></div></div>';

  drawBarH(document.getElementById('hpq1'),brands,'total_queue','brand',fmtInt);
  var storeView=brands.map(function(b){return{brand:b.brand,avg_stores:Math.round(b.total_stores/b.days)};});
  drawBarH(document.getElementById('hpq2'),storeView,'avg_stores','brand',fmtInt);

  var tbody=document.getElementById('hpqTbl');
  brands.forEach(function(r){
    tbody.innerHTML+='<tr><td style="font-weight:600;color:'+(BRAND_COLORS[r.brand]||'#333')+'">'+r.brand+'</td>'
    +'<td>'+r.days+'</td><td>'+fmtInt(r.total_queue)+'</td>'
    +'<td>'+Math.round(r.total_stores/r.days)+'</td>'
    +'<td>'+Math.round(r.stores_with_queue/r.days)+'</td>'
    +'<td>'+Math.round(r.total_queue/r.days)+'</td></tr>';
  });
}

function renderHpSumRate(fDate,fCity){
  var cityLabel=fCity&&fCity!=='全部'?' ('+fCity+')':'';
  var el=document.getElementById('sp-hps_rate');

  if(fCity && fCity!=='全部'){

    if(!cd.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}

        +'<th>品牌</th><th>门店数</th><th>排队门店</th><th>排队门店率</th><th>总排队号</th>'
        +'</tr></thead><tbody id="hprTbl"></tbody></table></div></div>';
      var pctItems=items.map(function(r){return{brand:r.brand,val:+(r.pct*100).toFixed(1)};});

        +'<td>'+fmtInt(r.queue_stores)+'</td><td><span class="badge '+(r.pct>.5?'bg-g':r.pct>.3?'bg-o':'bg-r')+'">'+fmtPct(r.pct)+'</span></td>'
        +'<td>'+fmtInt(r.total_queue)+'</td></tr>';
      });
    } else {
      var byBrand={};cd.forEach(function(r){
        if(!byBrand[r.brand])byBrand[r.brand]=[];
        var pct=(r.store_count>0?(r.queue_stores||0)/r.store_count:0);

      });
      var trendData=dates.map(function(dt){

      drawLineChart(document.getElementById('hpr1'),trendData,bNames,bColors,bNames,{tipFmt:function(v){return v.toFixed(1)+'%';}});
    }
  } else {
    // National level: use hpBrandData as before
    var d=hpBrandData.filter(function(r){return fDate==='全部'||r.date===fDate;});
    if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
    var dates=[...new Set(d.map(function(r){return r.date;}))].sort();
    if(fDate!=='全部'){
      var items=d.map(function(r){return{brand:r.brand,pct:r.queue_store_pct||0};}).sort(function(a,b){return b.pct-a.pct;});
      el.innerHTML='<div class="card"><h3>排队门店率对比 ('+fDate+')</h3><div id="hpr1"></div></div>'
        +'<div class="card"><h3>排队门店率明细</h3><div class="scroll-table"><table><thead><tr>'
        +'<th>品牌</th><th>总门店</th><th>排队门店</th><th>排队门店率</th><th>总排队号</th><th>店均排队</th>'
        +'</tr></thead><tbody id="hprTbl"></tbody></table></div></div>';
      var pctItems=items.map(function(r){return{brand:r.brand,val:+(r.pct*100).toFixed(1)};});
      drawBarH(document.getElementById('hpr1'),pctItems,'val','brand',function(v){return v+'%';});
      var tbody=document.getElementById('hprTbl');
      d.sort(function(a,b){return(b.queue_store_pct||0)-(a.queue_store_pct||0);}).forEach(function(r){
        tbody.innerHTML+='<tr><td style="font-weight:600">'+r.brand+'</td><td>'+fmtInt(r.total_stores)+'</td>'

        +'<td>'+fmtInt(r.total_queue)+'</td><td>'+fmtRate(r.avg_queue_per_store)+'</td></tr>';
      });
    } else {
      var byBrand={};d.forEach(function(r){
        if(!byBrand[r.brand])byBrand[r.brand]=[];
        byBrand[r.brand].push({date:r.date,pct:r.queue_store_pct||0});
      });
      var trendData=dates.map(function(dt){
        var row={_label:dt.slice(5)};

function renderHpSumExpand(fDate,fCity){
  var el=document.getElementById('sp-hps_expand');
  var cd=hpCityData;
  if(fCity && fCity!=='全部') cd=cd.filter(function(r){return r.city===fCity;});
  if(!cd.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  var cityLabel=fCity&&fCity!=='全部'?' ('+fCity+')':'';

  // City coverage matrix by brand
  var dates=[...new Set(cd.map(function(r){return r.date;}))].sort();
  var latest=fDate!=='全部'?fDate:(dates[dates.length-1]||'');
  var latestD=cd.filter(function(r){return r.date===latest;});
  
  var brandCities={};latestD.forEach(function(r){
    if(!brandCities[r.brand])brandCities[r.brand]=new Set();
    brandCities[r.brand].add(r.city);
  });
  
  var allCities=[...new Set(latestD.map(function(r){return r.city;}))].sort();
  var brandNames=Object.keys(brandCities).sort();
  
  var matrixHtml='<div class="card"><h3>城市覆盖矩阵 ('+latest+')</h3><div class="scroll-table"><table><thead><tr><th>城市</th>';
  brandNames.forEach(function(b){matrixHtml+='<th style="color:'+(BRAND_COLORS[b]||'#333')+'">'+b+'</th>';});
  matrixHtml+='<th>品牌数</th></tr></thead><tbody>';
  allCities.forEach(function(c){
    matrixHtml+='<tr><td style="font-weight:600">'+c+'</td>';
    var cnt=0;
    brandNames.forEach(function(b){
      var has=brandCities[b]&&brandCities[b].has(c);
      if(has)cnt++;
      matrixHtml+='<td style="text-align:center">'+(has?'<span style="color:#52c41a;font-weight:700">✓</span>':'<span style="color:#ddd">—</span>')+'</td>';
    });
    matrixHtml+='<td style="text-align:center;font-weight:600">'+cnt+'</td></tr>';
  });
  matrixHtml+='</tbody></table></div></div>';
  
  // Brand scale summary
  var scaleHtml='<div class="card"><h3>品牌规模概览 ('+latest+')</h3><div class="scroll-table"><table><thead><tr>'
    +'<th>品牌</th><th>覆盖城市</th><th>门店总数</th><th>排队门店</th><th>排队门店率</th><th>总排队号</th>'
    +'</tr></thead><tbody>';
  
  var bd=hpBrandData.filter(function(r){return r.date===latest;}).sort(function(a,b){return(b.total_stores||0)-(a.total_stores||0);});
  bd.forEach(function(r){
    var nCities=brandCities[r.brand]?brandCities[r.brand].size:0;
    scaleHtml+='<tr><td style="font-weight:600;color:'+(BRAND_COLORS[r.brand]||'#333')+'">'+r.brand+'</td>'
    +'<td>'+nCities+'</td><td>'+fmtInt(r.total_stores)+'</td><td>'+fmtInt(r.stores_with_queue)+'</td>'
    +'<td><span class="badge '+(r.queue_store_pct>.5?'bg-g':r.queue_store_pct>.3?'bg-o':'bg-r')+'">'+fmtPct(r.queue_store_pct)+'</span></td>'
    +'<td>'+fmtInt(r.total_queue)+'</td></tr>';
  });
  scaleHtml+='</tbody></table></div></div>';
  
  // Monthly store count trend
  var monthlyStores={};hpBrandData.forEach(function(r){
    var m=r.date.slice(0,7);
    var key=r.brand+'|'+m;
    if(!monthlyStores[key]||r.total_stores>monthlyStores[key].stores){
      monthlyStores[key]={brand:r.brand,month:m,stores:r.total_stores};
    }
  });
  var allMonths=[...new Set(Object.values(monthlyStores).map(function(r){return r.month;}))].sort();
  var trendData=allMonths.map(function(m){
    var row={_label:m};
    BRANDS.forEach(function(b){
      var v=monthlyStores[b+'|'+m];
      row[b]=v?v.stores:null;
    });
    return row;
  });
  
  el.innerHTML='<div class="kpi-row">'
    +'<div class="kpi"><div class="kl">覆盖城市</div><div class="kv">'+allCities.length+'</div></div>'
    +'<div class="kpi"><div class="kl">品牌数</div><div class="kv">'+brandNames.length+'</div></div>'
    +'</div>'
    +scaleHtml+matrixHtml
    +'<div class="card"><h3>各品牌门店数月度趋势</h3><div id="hpe1"></div></div>';
  
  if(trendData.length>1){
    var bColors=BRANDS.map(function(b){return BRAND_COLORS[b]||'#999';});
    drawLineChart(document.getElementById('hpe1'),trendData,BRANDS,bColors,BRANDS,{tipFmt:function(v){return v+'家';}});
  }
}

  var selD=document.getElementById(bid+'_fDate');
  if(selD){selD.innerHTML='<option>全部</option>';dates.forEach(function(d){selD.innerHTML+='<option>'+d+'</option>';});if(dates.length)selD.value=dates[dates.length-1];}
  var selC=document.getElementById(bid+'_fCity');
  if(selC){selC.innerHTML='<option>全部</option>';cities.forEach(function(c){selC.innerHTML+='<option>'+c+'</option>';});}
}

function hpBTab(bid,t){
  curHpBrandTab[bid]=t;
  var tabs=['queue','stores','heat','expand'];
  var tabsEl=document.getElementById(bid+'Tabs');
  if(tabsEl)tabsEl.querySelectorAll('.tab').forEach(function(el,i){el.classList.toggle('active',tabs[i]===t);});
  tabs.forEach(function(p){var e=document.getElementById('sp-'+bid+'_'+p);if(e)e.classList.toggle('hidden',p!==t);});
  hpBRender(bid);
}

function hpBRender(bid){
  var brand=bid.replace('hp_','');
  var selD=document.getElementById(bid+'_fDate');
  var selC=document.getElementById(bid+'_fCity');
  var fDate=selD?selD.value:'全部';
  var fCity=selC?selC.value:'全部';
  var tab=curHpBrandTab[bid]||'queue';
  
  if(tab==='queue') renderHpBQueue(bid,brand,fDate,fCity);
  else if(tab==='stores') renderHpBStores(bid,brand,fDate,fCity);
  else if(tab==='heat') renderHpBHeat(bid,brand,fDate,fCity);
  else renderHpBExpand(bid,brand,fDate,fCity);
}

function renderHpBQueue(bid,brand,fDate,fCity){
  var d=hpCityData.filter(function(r){return r.brand===brand&&(fDate==='全部'||r.date===fDate)&&(fCity==='全部'||r.city===fCity);});
  var countEl=document.getElementById(bid+'Count');
  if(countEl)countEl.textContent=d.length+' 条';
  var el=document.getElementById('sp-'+bid+'_queue');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  
  // KPIs from brand data
  var bd=hpBrandData.filter(function(r){return r.brand===brand&&(fDate==='全部'||r.date===fDate);});
  var totalQ=bd.reduce(function(s,r){return s+(r.total_queue||0);},0);
  var totalS=bd.length?bd[bd.length-1].total_stores:0;
  var avgPct=bd.reduce(function(s,r){return s+(r.queue_store_pct||0);},0)/(bd.length||1);
  
  // Aggregate by city
  var cg={};d.forEach(function(r){
    if(!cg[r.city])cg[r.city]={city:r.city,queue:0,stores:0,days:0};
    cg[r.city].queue+=r.total_queue||0;
    cg[r.city].stores=Math.max(cg[r.city].stores,r.store_count||0);
    cg[r.city].days++;
  });
  var cities=Object.values(cg).sort(function(a,b){return b.queue-a.queue;});
  
  el.innerHTML='<div class="kpi-row">'
    +'<div class="kpi"><div class="kl">总排队号数</div><div class="kv">'+fmtInt(totalQ)+'</div></div>'
    +'<div class="kpi"><div class="kl">门店数</div><div class="kv">'+fmtInt(totalS)+'</div></div>'
    +'<div class="kpi"><div class="kl">排队门店率</div><div class="kv">'+fmtPct(avgPct)+'</div></div>'
    +'<div class="kpi"><div class="kl">覆盖城市</div><div class="kv">'+cities.length+'</div></div>'
    +'</div>'
    +'<div class="g2"><div class="card"><h3>城市排队号数排行</h3><div id="'+bid+'q1"></div></div>'
    +'<div class="card"><h3>城市门店数</h3><div id="'+bid+'q2"></div></div></div>'
    +'<div class="card"><h3>城市排队明细</h3><div class="scroll-table"><table><thead><tr>'
    +'<th>城市</th><th>数据天数</th><th>门店数</th><th>总排队号</th><th>日均排队</th>'
    +'</tr></thead><tbody id="'+bid+'qTbl"></tbody></table></div></div>';
  
  drawBarH(document.getElementById(bid+'q1'),cities.slice(0,15),'queue','city',fmtInt,BRAND_COLORS[brand]);
  drawBarH(document.getElementById(bid+'q2'),cities.slice(0,15),'stores','city',fmtInt,BRAND_COLORS[brand]);
  
  var tbody=document.getElementById(bid+'qTbl');
  cities.forEach(function(r){
    tbody.innerHTML+='<tr><td style="font-weight:600">'+r.city+'</td><td>'+r.days+'</td><td>'+r.stores+'</td>'
    +'<td>'+fmtInt(r.queue)+'</td><td>'+Math.round(r.queue/r.days)+'</td></tr>';
  });
}

function renderHpBStores(bid,brand,fDate,fCity){
  var d=hpStoreData.filter(function(r){return r.brand===brand&&(fDate==='全部'||r.date===fDate)&&(fCity==='全部'||r.city===fCity);});
  var el=document.getElementById('sp-'+bid+'_stores');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  
  // Aggregate by store
  var sg={};d.forEach(function(r){
    var key=r.store_id;
    if(!sg[key])sg[key]={store_name:r.store_name,city:r.city,district:r.district||'',max_queue:0,total_slots:0,days:0};
    sg[key].max_queue=Math.max(sg[key].max_queue,r.max_queue||0);
    sg[key].total_slots+=(r.queue_slots||0);
    sg[key].days++;
  });
  var stores=Object.values(sg).sort(function(a,b){return b.max_queue-a.max_queue;});
  
  el.innerHTML='<div class="card"><h3>门店最大排队号排行 TOP30</h3><div id="'+bid+'s1"></div></div>'
    +'<div class="card"><h3>门店排队明细 ('+stores.length+'家)</h3><div class="scroll-table"><table><thead><tr>'
    +'<th>门店</th><th>城市</th><th>区域</th><th>最大排队号</th><th>日均排队时段</th><th>数据天数</th>'
    +'</tr></thead><tbody id="'+bid+'sTbl"></tbody></table></div></div>';
  
  drawBarH(document.getElementById(bid+'s1'),stores.slice(0,30),'max_queue','store_name',fmtInt,BRAND_COLORS[brand]);
  
  var tbody=document.getElementById(bid+'sTbl');
  stores.slice(0,200).forEach(function(r){
    tbody.innerHTML+='<tr><td style="font-weight:600">'+r.store_name+'</td><td>'+r.city+'</td><td>'+r.district+'</td>'
    +'<td>'+fmtInt(r.max_queue)+'</td><td>'+fmtRate(r.total_slots/r.days)+'</td><td>'+r.days+'</td></tr>';
  });
}

function renderHpBHeat(bid,brand,fDate,fCity){
  var d=hpStoreData.filter(function(r){return r.brand===brand&&(fDate==='全部'||r.date===fDate)&&(fCity==='全部'||r.city===fCity);});
  var el=document.getElementById('sp-'+bid+'_heat');
  if(!d.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  
  // Daily queue trend
  var dayG={};d.forEach(function(r){
    if(!dayG[r.date])dayG[r.date]={date:r.date,total_queue:0,stores:0,queue_stores:0};
    dayG[r.date].total_queue+=(r.max_queue||0);
    dayG[r.date].stores++;
    if(r.max_queue>0)dayG[r.date].queue_stores++;
  });
  var trend=Object.values(dayG).sort(function(a,b){return a.date>b.date?1:-1;}).map(function(r){
    return{_label:r.date.slice(5),total:r.total_queue,stores:r.stores,rate:r.stores?(r.queue_stores/r.stores):0};
  });
  
  // Time slot analysis from total_slots
  var slotG={};d.forEach(function(r){
    if(!slotG[r.date])slotG[r.date]=0;
    slotG[r.date]+=(r.queue_slots||0);
  });
  var slotTrend=Object.keys(slotG).sort().map(function(dt){return{_label:dt.slice(5),slots:slotG[dt]};});
  
  el.innerHTML='<div class="g2">'
    +'<div class="card"><h3>每日总排队号数趋势</h3><div id="'+bid+'h1"></div></div>'
    +'<div class="card"><h3>每日排队时段数趋势</h3><div id="'+bid+'h2"></div></div></div>';
  
  if(trend.length>1){
    drawLineChart(document.getElementById(bid+'h1'),trend,['total'],[BRAND_COLORS[brand]||COLORS[0]],['总排队号'],{tipFmt:fmtInt});
    drawLineChart(document.getElementById(bid+'h2'),slotTrend,['slots'],[BRAND_COLORS[brand]||COLORS[1]],['排队时段数'],{tipFmt:fmtInt});
  } else {
    document.getElementById(bid+'h1').innerHTML='<div style="color:#999;text-align:center;padding:20px">选择"全部"日期可查看趋势</div>';
    document.getElementById(bid+'h2').innerHTML='<div style="color:#999;text-align:center;padding:20px">选择"全部"日期可查看趋势</div>';
  }
}

function renderHpBExpand(bid,brand,fDate,fCity){
  var el=document.getElementById('sp-'+bid+'_expand');
  var cd=hpCityData.filter(function(r){return r.brand===brand;});
  if(!cd.length){el.innerHTML='<div class="card" style="text-align:center;padding:40px;color:#999">暂无数据</div>';return;}
  
  var dates=[...new Set(cd.map(function(r){return r.date;}))].sort();
  var latest=fDate!=='全部'?fDate:(dates[dates.length-1]||'');
  var latestD=cd.filter(function(r){return r.date===latest;});
  var allCities=[...new Set(latestD.map(function(r){return r.city;}))].sort();
  var totalStores=latestD.reduce(function(s,r){return s+(r.store_count||0);},0);
  
  // Monthly store counts
  var monthlyStores={};cd.forEach(function(r){
    var m=r.date.slice(0,7);
    if(!monthlyStores[m])monthlyStores[m]=0;
    monthlyStores[m]=Math.max(monthlyStores[m],r.store_count||0);
  });
  
  // city-date matrix
  var matrixHtml='<div class="card"><h3>城市覆盖矩阵</h3><div class="scroll-table"><table><thead><tr><th>城市</th><th>门店数</th><th>排队门店</th><th>排队号</th></tr></thead><tbody>';
  latestD.sort(function(a,b){return(b.store_count||0)-(a.store_count||0);}).forEach(function(r){
    matrixHtml+='<tr><td style="font-weight:600">'+r.city+'</td><td>'+fmtInt(r.store_count)+'</td>'
    +'<td>'+fmtInt(r.queue_stores)+'</td><td>'+fmtInt(r.total_queue)+'</td></tr>';
  });
  matrixHtml+='</tbody></table></div></div>';
  
  el.innerHTML='<div class="kpi-row">'
    +'<div class="kpi"><div class="kl">覆盖城市</div><div class="kv">'+allCities.length+'</div><div class="ks">'+latest+'</div></div>'
    +'<div class="kpi"><div class="kl">门店总数</div><div class="kv">'+totalStores+'</div></div>'
    +'</div>'+matrixHtml;
}

// === Init ===
function initAllFilters(){
  initSushiroFilters();
  initHpSumFilters();
  BRANDS.forEach(function(b){initHpBrandFilters('hp_'+b);});
}

// Auto refresh
setInterval(function(){loadAllData();}, 10*60*1000);

// Boot
loadAllData();
</script>
