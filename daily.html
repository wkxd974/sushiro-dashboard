  if(pts.length<2)return '<svg class="dq-spark" width="'+w+'" height="'+h+'"></svg>';
  const lo=Math.min(...pts),hi=Math.max(...pts),rng=(hi-lo)||1,n=pts.length,co=[];
  for(let i=0;i<n;i++){const x=(i*(w-4)/(n-1)+2).toFixed(1);const y=(h-3-(pts[i]-lo)/rng*(h-6)).toFixed(1);co.push(x+','+y);}
  const up=pts[n-1]>=pts[0],color=up?'var(--dq-up)':'var(--dq-down)',last=co[n-1].split(',');
  return '<svg class="dq-spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<polyline fill="none" stroke="'+color+'" stroke-width="1.4" points="'+co.join(' ')+'"/>'+
    '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2" fill="'+color+'"/></svg>';
}

// ================= 渲染 =================
function render(byKey, latest){
  // 告警条
  let hits=[];
  for(const k in ALERT_THRESHOLDS){const m=byKey[k];if(!m||m.prev==null)continue;
    const d=Math.abs(m.value-m.prev);if(d>ALERT_THRESHOLDS[k])hits.push(meta(k).name+' 日变动 '+d.toFixed(4)+' (阈值 '+ALERT_THRESHOLDS[k]+')');}
  const alert=hits.length?'<div class="dq-alert dq-alert-warn">⚠ 触发告警:'+esc(hits.join(' · '))+'</div>'
    :'<div class="dq-alert dq-alert-ok">✓ 今日无指标突破阈值,资金面平稳</div>';

  let html='<div class="dq-asof">数据截至: '+esc(latest)+'</div>'+alert;
  for(const g of GROUPS){
    let cards='';
    for(const c of g.cards) cards+=cardHTML(c,byKey,latest);
    html+='<div class="dq-group"><div class="dq-group-head">'+esc(g.title)+'</div><div class="dq-grid">'+cards+'</div></div>';
  }
  // 全表
  let rows='';
  Object.keys(byKey).sort().forEach(k=>{const m=byKey[k];
    rows+='<tr><td>'+esc(meta(k).name)+'</td><td class="dq-mono">'+esc(k)+'</td>'+
      '<td class="num">'+fmt(m.value,k)+unit(k)+'</td><td class="num">'+deltaHTML(m.value,m.prev,k)+'</td>'+
      '<td>'+esc(m.date)+'</td><td class="dq-src-cell">'+esc(m.source||'')+'</td></tr>';});
  html+='<div class="dq-section-title">全指标明细</div><table class="dq-table"><thead><tr><th>指标</th><th>key</th>'+
    '<th class="num">最新值</th><th class="num">日环比</th><th>数据日期</th><th>数据来源(发布机构)</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('content').innerHTML=html;
  bindExpand();
}
function seriesAttr(k,m){return "data-s='"+esc(JSON.stringify(m.series||[]))+"' data-n=\""+esc(meta(k).name)+"\" data-u=\""+esc(unit(k))+"\" data-d=\""+meta(k).dec+"\" data-src=\""+esc(m.source||'')+"\"";}
function cardHTML(c,byKey,latest){
  const tip=esc(c.tip);
  if(!c.primary){const ph=esc(c.placeholder||'待接入');
    return '<div class="dq-card dq-card-ph"><div class="dq-card-title">'+esc(c.title)+'</div><div class="dq-ph">'+ph+'</div><div class="dq-tip">'+tip+'</div></div>';}
  const m=byKey[c.primary];
  if(!m)return '<div class="dq-card dq-card-ph"><div class="dq-card-title">'+esc(c.title)+'</div><div class="dq-ph">待补</div><div class="dq-tip">'+tip+'</div></div>';
  const pk=c.primary;
  let stale='';if(latest&&m.date&&m.date<latest)stale='<span class="dq-stale">@'+esc(m.date.slice(5))+'</span>';
  let subs='';
  for(const sk of (c.subs||[])){const sm=byKey[sk];const sn=esc(meta(sk).name);
    if(sm){let _extra='';
      if(sk==='comm.gold_xau'){const cp=byKey['fx.usdcny_central'];
        if(cp&&cp.value){const rmbg=sm.value*cp.value/31.1035;
          _extra='<div class="dq-conv">\u2248 '+rmbg.toFixed(2)+' 元/克 · 按中间价('+cp.value.toFixed(4)+')折</div>';}}
      subs+='<div class="dq-sub dq-metric" '+seriesAttr(sk,sm)+'><span class="dq-sub-n">'+sn+'</span><span class="dq-sub-v">'+fmt(sm.value,sk)+unit(sk)+' '+deltaHTML(sm.value,sm.prev,sk)+'</span></div>'+_extra;}
    else subs+='<div class="dq-sub"><span class="dq-sub-n">'+sn+'</span><span class="dq-sub-v dq-todo">待补</span></div>';}
  return '<div class="dq-card"><div class="dq-card-title">'+esc(c.title)+stale+'</div>'+
    '<div class="dq-main dq-metric" '+seriesAttr(pk,m)+'><div class="dq-val">'+fmt(m.value,pk)+'<span class="dq-unit">'+unit(pk)+'</span></div>'+
    '<div class="dq-main-right">'+deltaHTML(m.value,m.prev,pk)+sparkSVG(m.series||[])+'</div></div>'+
    '<div class="dq-primary-name">'+esc(meta(pk).name)+' <span class="dq-click-hint">点击看30日</span></div>'+
    subs+'<div class="dq-expand"><div class="dq-exp-title"></div><div class="dq-exp-body"></div></div>'+
    (m.source?'<div class="dq-src">来源 · '+esc(m.source)+'</div>':'')+
    '<div class="dq-tip">'+tip+'</div></div>';
}

// ================= 点击展开30日 (复刻 daily_module 逻辑) =================
function drawChart(body,series,name,uni,dec){
  if(!series||series.length<2){body.innerHTML='<div class="dq-exp-empty">仅 '+(series?series.length:0)+' 个交易日,数据不足以绘制走势</div>';return;}
  const W=300,H=110,x0=6,x1=294,y0=16,y1=86,vals=series.map(p=>p[1]);
  const lo=Math.min(...vals),hi=Math.max(...vals),rng=(hi-lo)||1,n=series.length,pts=[];
  for(let i=0;i<n;i++){pts.push([Math.round((x0+i*(x1-x0)/(n-1))*10)/10,Math.round((y1-(series[i][1]-lo)/rng*(y1-y0))*10)/10]);}
  const poly=pts.map(p=>p[0]+','+p[1]).join(' '),up=vals[n-1]>=vals[0],color=up?'var(--dq-up)':'var(--dq-down)';
  const d0=series[0][0].slice(5),dN=series[n-1][0].slice(5);
  let svg='<svg class="dq-exp-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<text x="'+x0+'" y="11" class="dq-ax">'+hi.toFixed(dec)+'</text><text x="'+x0+'" y="'+(H-2)+'" class="dq-ax">'+lo.toFixed(dec)+'</text>'+
    '<text x="'+x1+'" y="'+(H-2)+'" class="dq-ax" text-anchor="end">'+dN+'</text><text x="'+x0+'" y="'+(H-2)+'" class="dq-ax" dx="22">'+d0+'</text>'+
    '<polyline fill="none" stroke="'+color+'" stroke-width="1.5" points="'+poly+'"/>'+
    '<line class="dq-cur" x1="0" y1="'+y0+'" x2="0" y2="'+y1+'" stroke="#bdb9af" stroke-width="1" stroke-dasharray="3,3" style="display:none"/>'+
    '<circle class="dq-curdot" r="3" fill="'+color+'" stroke="#fff" stroke-width="1.2" style="display:none"/>'+
    '<rect class="dq-hit" x="'+x0+'" y="'+y0+'" width="'+(x1-x0)+'" height="'+(y1-y0)+'" fill="transparent" style="cursor:crosshair"/></svg>';
  body.innerHTML=svg;
  const sv=body.querySelector('svg'),hit=body.querySelector('.dq-hit'),cur=body.querySelector('.dq-cur'),dot=body.querySelector('.dq-curdot');
  const tip=document.getElementById('dq-tip2');
  hit.addEventListener('mousemove',function(ev){const br=sv.getBoundingClientRect();const mx=(ev.clientX-br.left)/br.width*W;
    let bi=0,bd=1e9;for(let i=0;i<pts.length;i++){const dd=Math.abs(pts[i][0]-mx);if(dd<bd){bd=dd;bi=i;}}
    const p=pts[bi];cur.setAttribute('x1',p[0]);cur.setAttribute('x2',p[0]);cur.style.display='';dot.setAttribute('cx',p[0]);dot.setAttribute('cy',p[1]);dot.style.display='';
    tip.innerHTML='<b>'+series[bi][0]+'</b> · '+name+' '+series[bi][1].toFixed(dec)+uni;tip.style.left=ev.clientX+'px';tip.style.top=(ev.clientY-12)+'px';tip.style.display='block';});
  hit.addEventListener('mouseleave',function(){cur.style.display='none';dot.style.display='none';tip.style.display='none';});
}
function bindExpand(){
  if(!document.getElementById('dq-tip2')){const t=document.createElement('div');t.id='dq-tip2';t.className='dq-tip2';document.body.appendChild(t);}
  document.getElementById('content').addEventListener('click',function(ev){
    const el=ev.target.closest('.dq-metric');if(!el)return;const card=el.closest('.dq-card');
    const exp=card.querySelector('.dq-expand'),ttl=card.querySelector('.dq-exp-title'),body=card.querySelector('.dq-exp-body');
    if(exp.classList.contains('open')&&exp.dataset.cur===el.dataset.n){exp.classList.remove('open');card.querySelectorAll('.dq-metric').forEach(x=>x.classList.remove('dq-active'));const _s0=card.querySelector('.dq-src'),_mn=card.querySelector('.dq-main');if(_s0&&_mn&&_mn.dataset.src)_s0.textContent='来源 · '+_mn.dataset.src;return;}
    card.querySelectorAll('.dq-metric').forEach(x=>x.classList.remove('dq-active'));el.classList.add('dq-active');
    const _sEl=card.querySelector('.dq-src');if(_sEl&&el.dataset.src)_sEl.textContent='来源 · '+el.dataset.src;
    let series=[];try{series=JSON.parse(el.getAttribute('data-s')||'[]');}catch(e){}
    ttl.textContent=el.dataset.n+' · 近30日';drawChart(body,series,el.dataset.n,el.dataset.u||'',parseInt(el.dataset.d||'2',10));
    exp.classList.add('open');exp.dataset.cur=el.dataset.n;});
}

// ================= 取数: anon key fetch daily_metrics =================
function getAnonKey(){
  // 部署版: 只用文件里写死的 anon key, 不读浏览器存储、不弹框(避免多端不一致)。
  // 未替换占位符 → 返回空, 页面给出明确提示(而非弹框)。
  const k = SUPABASE_ANON_KEY;
  if(k && k!=="__ANON_KEY__" && k!=="PASTE_YOUR_ANON_KEY_HERE") return k;
  return "";
}
async function load(){
  try{
    const anonKey = getAnonKey();
    if(!anonKey){
      document.getElementById('content').innerHTML='<div class="dq-err">daily.html 里的 anon key 未填写(仍是占位符 __ANON_KEY__)。请在文件中替换为真实 anon key 后重新部署。</div>';
      return;
    }
    const sb=supabase.createClient(SUPABASE_URL,anonKey);
    // 取近 ~45 天(够画30日走势 + 算环比)
    const since=new Date(Date.now()-60*864e5).toISOString().slice(0,10);
    const {data,error}=await sb.from('daily_metrics').select('date,key,name,value,source').gte('date',since).order('date',{ascending:true});
    if(error)throw error;
    if(!data||!data.length){document.getElementById('content').innerHTML='<div class="dq-err">daily_metrics 暂无数据。请先在本地跑 push_daily_to_supabase.py 推送。</div>';return;}
    // 组织: byKey[key] = {value,date,prev,series:[[date,value]...]}
    const groups={},srcByKey={};
    for(const r of data){(groups[r.key]=groups[r.key]||[]).push([r.date,r.value]);srcByKey[r.key]=r.source;}
    const byKey={};let latest='';
    for(const k in groups){const s=groups[k].slice(-SPARK_DAYS);const last=s[s.length-1];
      byKey[k]={value:last[1],date:last[0],prev:s.length>1?s[s.length-2][1]:null,series:s,source:srcByKey[k]};
      if(last[0]>latest)latest=last[0];}
    render(byKey,latest);
  }catch(e){
    const msg=(e&&(e.message||e.hint||''))+'';
    if(/api key|JWT|401|invalid|unauthor/i.test(msg)){
      document.getElementById('content').innerHTML='<div class="dq-err">anon key 无效或权限不足: '+esc(msg)+'<br>检查 daily.html 里的 anon key 是否为当前有效的只读 key(roll 过则旧 key 失效)。</div>';
    }else{
      document.getElementById('content').innerHTML='<div class="dq-err">加载失败: '+esc(msg)+'<br>检查 RLS 是否允许 anon 只读、网络是否能访问 Supabase。</div>';
    }
  }
}
load();
</script>
