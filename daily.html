<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>海底捞宏观追踪看板 · 每日资金面</title>
<style>

:root{
  --bg-page:#f7f4ed;
  --bg-main:#fbf9f2;
  --bg-card:#ffffff;
  --bg-card-2:#faf7ee;
  --bg-sidebar:#1d1a17;
  --bg-sidebar-active:#2a2622;
  --ink:#1a1714;
  --ink-2:#3d3a35;
  --muted:#7a766e;
  --muted-2:#a8a49c;
  --muted-3:#c4c0b4;
  --line:#e5e0d2;
  --line-soft:#efeadb;
  --hdl-red:#a8201a;
  --hdl-red-soft:#f4dedc;
  --green:#4a7048;
  --green-soft:#e9efe7;
  --yellow:#c9962d;
  --yellow-soft:#faf2dc;
  --red:#a8201a;
  --red-soft:#f4dedc;
  --info-bg:#e8f0f5;
  --info-border:#5b8aa6;
  --warn-bg:#fdf3df;
  --warn-border:#c9962d;
  --alert-bg:#fae5e3;
  --alert-border:#a8201a;
  --serif:'Noto Serif SC',serif;
  --sans:'Noto Sans SC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}



.app{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}



.sidebar{
  background:var(--bg-sidebar);
  color:#d6d2c8;
  padding:0;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  border-right:1px solid #2a2622;
}

.sidebar::-webkit-scrollbar{width:6px}

.sidebar::-webkit-scrollbar-thumb{background:#3d3a35;border-radius:3px}


.sb-brand{
  padding:20px 22px 18px;
  border-bottom:1px solid #2a2622;
  margin-bottom:6px;
}

.sb-brand-name{
  font-family:var(--serif);
  font-size:18px;
  font-weight:900;
  color:#fff;
  line-height:1.25;
  margin-bottom:4px;
  letter-spacing:-0.3px;
}

.sb-brand-name .dot{color:var(--hdl-red)}

.sb-brand-sub{
  font-family:var(--mono);
  font-size:9.5px;
  color:#7a766e;
  letter-spacing:2.5px;
}


.sb-group{
  padding:10px 0;
}

.sb-group-head{
  padding:8px 22px 6px;
  font-family:var(--mono);
  font-size:10px;
  letter-spacing:2px;
  color:#5d5a52;
  text-transform:uppercase;
}

.sb-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 22px 7px 30px;
  font-size:13px;
  color:#a8a49c;
  cursor:pointer;
  position:relative;
  transition:all 0.12s;
}

.sb-item:hover{
  color:#fff;
  background:#252220;
}

.sb-item.active{
  color:#fff;
  background:var(--bg-sidebar-active);
}

.sb-item.active::before{
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background:var(--hdl-red);
}

.sb-item-dot{
  width:5px;height:5px;
  border-radius:50%;
  background:#5d5a52;
  margin-right:10px;
  flex-shrink:0;
  display:inline-block;
}

.sb-item.active .sb-item-dot{background:var(--hdl-red)}

.sb-item-text{flex:1}

.sb-item-badge{
  font-family:var(--mono);
  font-size:8.5px;
  color:#5d5a52;
  padding:1px 6px;
  border:1px solid #3d3a35;
  letter-spacing:1px;
  margin-left:6px;
}

.sb-item-badge.live{
  color:var(--green);
  border-color:#2e4a2c;
  background:rgba(74,112,72,0.1);
}

.sb-item-badge.new{
  color:var(--hdl-red);
  border-color:#5d2826;
}

.sb-item-badge.dev{
  color:#5d5a52;
  font-style:italic;
}

.sb-item-badge.reserved{
  color:var(--muted-2);
  font-style:italic;
}
</style>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日资金面 · 海底捞</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--muted:#7a766e;--border:#e8e3d7;--bg-card:#fff;--hdl-red:#a8201a;--mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --dq-up:#c0392b;--dq-down:#1e8449;--dq-flat:#9a958c;}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f2ea;margin:0;padding:24px;color:#22201d;}
.wrap{max-width:1440px;margin:0 auto;}
.mobile-topbar,.mobile-nav-mask{display:none;}
.page-title{margin:0 0 4px;font-size:26px;font-weight:800;}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
.dq-asof{color:var(--muted);font-size:12px;font-family:var(--mono);margin-bottom:10px;}
.dq-runtime{display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;margin:2px 0 14px;
  padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-size:11px;}
.dq-runtime-badge{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:#1e8449;}
.dq-runtime-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:#2e9b5f;}
.dq-runtime-cache{color:#9a6700;}
.dq-runtime-cache::before{background:#d6a11d;}
.dq-runtime-time{font-family:var(--mono);}
.dq-alert{padding:10px 14px;border-radius:7px;font-size:13px;margin-bottom:16px;font-weight:650;border:1px solid transparent;}
.dq-alert-ok{background:#e8f3ec;color:#1e8449;}
.dq-alert-watch{background:#fff5d9;color:#8a6100;border-color:#ead69a;}
.dq-alert-danger{background:#fbe3e0;color:#b53227;border-color:#edbbb5;}
.dq-alert-link{appearance:none;border:0;background:transparent;color:inherit;font:inherit;padding:2px 4px;
  text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;cursor:pointer;}
.dq-viewbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 0 14px;}
.dq-viewhint{font-size:11px;color:var(--muted);}
.dq-view-switch{display:inline-flex;padding:3px;background:#ebe6db;border-radius:8px;flex:0 0 auto;}
.dq-view-btn{appearance:none;border:0;background:transparent;color:var(--muted);padding:7px 13px;border-radius:6px;
  font-size:12px;font-weight:650;cursor:pointer;}
.dq-view-btn.active{background:#fff;color:#22201d;box-shadow:0 1px 4px rgba(45,40,34,.12);}
.dq-loading{padding:40px;text-align:center;color:var(--muted);}
.dq-err{padding:16px;background:#fbe3e0;color:#c0392b;border-radius:8px;font-size:13px;}
.dq-overview{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:0 0 16px;}
.dq-overview-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;min-width:0;}
.dq-overview-action{appearance:none;width:100%;text-align:left;color:inherit;font:inherit;cursor:pointer;transition:border-color .15s,transform .15s;}
.dq-overview-action:hover{border-color:#b6813d;transform:translateY(-1px);}
.dq-overview-label{font-size:11px;color:var(--muted);margin-bottom:5px;}
.dq-overview-value{font-size:14px;font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dq-overview-note{font-size:10px;color:var(--muted);margin-top:3px;}
.dq-group-nav{display:flex;flex-wrap:wrap;gap:10px;margin:4px 0 22px;padding:10px 0 16px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;background:#f5f2ea;}
.dq-nav-btn{appearance:none;background:var(--bg-card);color:#292622;border:1px solid #ded7c8;border-radius:999px;padding:10px 17px;font-size:13px;font-weight:600;line-height:1;cursor:pointer;box-shadow:0 1px 0 rgba(34,32,29,.03);transition:border-color .15s,background .15s,transform .15s;}
.dq-nav-btn:hover{border-color:#9b9487;background:#faf8f3;transform:translateY(-1px);}
.dq-nav-btn.active{background:#24211e;color:#fff;border-color:#24211e;}
.dq-nav-btn span{margin-left:5px;font-size:15px;}
.dq-group{margin-bottom:28px;scroll-margin-top:96px;}
.dq-group-head{font-weight:700;font-size:14px;margin:0 0 10px;padding-left:8px;border-left:3px solid var(--hdl-red);}
.dq-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;}
.dq-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:15px 16px;min-width:0;}
.dq-card.dq-alert-target{border-color:#b6813d;box-shadow:0 0 0 3px rgba(182,129,61,.16);}
.dq-card-ph{opacity:0.72;border-style:dashed;}
.dq-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:9px;}
.dq-card-title{font-size:12px;color:var(--muted);font-weight:650;}
.dq-card-date{font-family:var(--mono);font-size:10px;color:var(--dq-flat);white-space:nowrap;}
.dq-main{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;}
.dq-val{font-family:var(--mono);font-size:24px;font-weight:700;line-height:1;}
.dq-unit{font-size:12px;color:var(--muted);margin-left:3px;font-weight:400;}
.dq-main-right{text-align:right;}
.dq-delta{font-family:var(--mono);font-size:12px;font-weight:700;display:block;margin-bottom:3px;}
.dq-up{color:var(--dq-up);}.dq-down{color:var(--dq-down);}.dq-flat{color:var(--dq-flat);}
.dq-primary-name{font-size:11px;color:var(--muted);margin-top:4px;}
.dq-src{font-size:10px;color:var(--muted);margin-top:8px;font-style:italic;letter-spacing:.2px;opacity:.85;}
.dq-conv{font-size:11px;color:var(--muted);margin:2px 0 0 0;padding-left:2px;opacity:.9;}
.dq-src-cell{font-size:11px;color:var(--muted);}
.dq-click-hint{font-size:10px;color:var(--dq-flat);opacity:.7;}
.dq-stale{font-size:10px;color:var(--dq-flat);font-family:var(--mono);margin-left:6px;font-weight:400;}
.dq-sub{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:5px;padding-top:5px;border-top:1px dashed var(--border);}
.dq-subs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 12px;margin-top:7px;}
.dq-subs .dq-sub{min-width:0;}
.dq-subs .dq-sub-n{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:6px;}
.dq-sub-v{font-family:var(--mono);}
.dq-sub-toggle{display:none;width:100%;margin-top:8px;padding:8px;border:0;border-radius:6px;background:#f5f2ea;
  color:var(--muted);font-size:11px;cursor:pointer;}
.dq-todo{color:var(--dq-flat);font-style:italic;}
.dq-ph{font-size:16px;color:var(--dq-flat);padding:8px 0;font-style:italic;}
.dq-tip{font-size:11px;color:var(--muted);margin-top:9px;padding-top:8px;border-top:1px solid var(--border);line-height:1.5;}
.dq-why{margin-top:9px;padding-top:8px;border-top:1px solid var(--border);}
.dq-why summary{cursor:pointer;color:var(--muted);font-size:11px;font-weight:650;list-style:none;user-select:none;}
.dq-why summary::-webkit-details-marker{display:none;}
.dq-why summary::after{content:' ▾';}
.dq-why[open] summary::after{content:' ▴';}
.dq-why-body{font-size:11px;color:var(--muted);line-height:1.55;margin-top:7px;}
.dq-metric{cursor:pointer;border-radius:4px;transition:background .12s;}
.dq-metric:hover{background:rgba(168,32,26,.05);}
.dq-metric.dq-active{background:rgba(168,32,26,.09);}
.dq-main.dq-metric{padding:3px 5px;margin:0 -5px;}
.dq-expand{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.dq-expand.open{display:block;}
.dq-exp-title{font-size:11px;color:var(--muted);margin-bottom:3px;font-family:var(--mono);}
.dq-exp-chart{width:100%;height:104px;display:block;}
.dq-exp-empty{font-size:12px;color:var(--dq-flat);font-style:italic;padding:18px 0;text-align:center;}
.dq-ax{font-family:var(--mono);font-size:7px;fill:var(--dq-flat);}
.dq-spark{display:block;}
.dq-compare-toggle{width:100%;margin-top:9px;padding:8px 10px;border:1px solid #ded7c8;border-radius:7px;
  background:#faf8f3;color:#393631;font-size:11px;font-weight:650;cursor:pointer;text-align:left;}
.dq-compare-toggle::after{content:'展开 ▾';float:right;color:var(--muted);font-weight:500;}
.dq-compare-toggle.open::after{content:'收起 ▴';}
.dq-compare{display:none;margin-top:8px;padding:10px;background:#f8f5ef;border:1px solid var(--border);border-radius:8px;}
.dq-compare.open{display:block;}
.dq-compare-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:7px;}
.dq-compare-label{font-size:10px;color:var(--muted);}
.dq-compare-series{display:flex;flex-wrap:wrap;gap:5px;}
.dq-range-switch{display:flex;gap:4px;margin:0 0 8px;}
.dq-range-btn{appearance:none;border:1px solid #d8d1c4;border-radius:5px;background:#fff;color:var(--muted);
  padding:5px 10px;font:600 10px/1.2 var(--sans);cursor:pointer;}
.dq-range-btn.active{background:#24211e;border-color:#24211e;color:#fff;}
.dq-series-btn{appearance:none;border:1px solid #d8d1c4;border-radius:999px;background:#fff;color:var(--muted);
  padding:4px 9px;font:600 10px/1.2 var(--sans);cursor:pointer;}
.dq-series-btn.active{color:#fff;border-color:var(--series-color);background:var(--series-color);}
.dq-compare-chart{width:100%;height:142px;display:block;}
.dq-compare-insight{margin-top:7px;padding:8px 10px;border-left:3px solid #b6813d;background:#fff;
  color:#4d4942;font-size:11px;line-height:1.55;}
.dq-compare-insight strong{color:#24211e;}
.dq-compare-note{font-size:10px;color:var(--dq-flat);margin-top:3px;}
.dq-section-title{font-weight:700;font-size:13px;margin:26px 0 8px;}
.dq-detail-panel{margin-top:26px;border-top:1px solid var(--border);}
.dq-detail-summary{display:flex;align-items:center;justify-content:space-between;padding:16px 2px 12px;cursor:pointer;font-weight:700;font-size:13px;list-style:none;user-select:none;}
.dq-detail-summary::-webkit-details-marker{display:none;}
.dq-detail-summary::after{content:'展开全部 ▾';color:var(--muted);font-size:11px;font-weight:500;}
.dq-detail-panel[open] .dq-detail-summary::after{content:'收起 ▴';}
.dq-detail-body{overflow-x:auto;padding-bottom:8px;}
.dq-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
.dq-table th,.dq-table td{border-bottom:1px solid var(--border);padding:6px 8px;text-align:left;}
.dq-table .num{text-align:right;font-family:var(--mono);}
.dq-mono{font-family:var(--mono);color:var(--muted);font-size:11px;}
.dq-tip2{position:fixed;z-index:9999;pointer-events:none;background:rgba(34,32,29,.96);color:#fff;font-size:11px;
  padding:5px 9px;border-radius:5px;white-space:nowrap;transform:translate(-50%,-130%);display:none;
  font-family:var(--mono);box-shadow:0 2px 10px rgba(0,0,0,.25);}
.cal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:18px;}
.cal-head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.cal-head-title{font-weight:700;font-size:14px;padding-left:8px;border-left:3px solid var(--hdl-red);}
.cal-toggle{font-size:12px;color:var(--muted);font-family:var(--mono);white-space:nowrap;}
.cal-head:hover .cal-toggle{color:var(--hdl-red);}
.cal-summary{margin-top:9px;}
.cal-sum-ev{padding:0;}
.cal-sum-date{font-size:12px;color:var(--muted);font-family:var(--mono);font-weight:700;flex:0 0 auto;}
.cal-sum-date.today{color:var(--hdl-red);}
.cal-full{margin-top:8px;border-top:1px solid var(--line-soft);padding-top:4px;}
.cal-day{padding:9px 0;border-top:1px solid var(--line-soft);}
.cal-day:first-of-type{border-top:none;}
.cal-day-head{font-size:12px;color:var(--muted);font-weight:700;margin-bottom:5px;font-family:var(--mono);}
.cal-day-head.today{color:var(--hdl-red);}
.cal-ev{display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:13px;line-height:1.5;}
.cal-dot{width:6px;height:6px;border-radius:50%;flex:0 0 auto;position:relative;top:5px;}
.cal-dot.imp3{background:var(--red);}
.cal-dot.imp2{background:#c79a3a;}
.cal-dot.imp1{background:var(--muted-2);}
.cal-ev-time{color:var(--muted);font-family:var(--mono);font-size:12px;flex:0 0 auto;}
.cal-ev-name{color:var(--ink-2);}
.cal-ev-name a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--muted-2);}
.cal-ev-name a:hover{color:var(--hdl-red);border-bottom-color:var(--hdl-red);}
.cal-ev-region{font-size:11px;color:var(--muted-2);border:1px solid var(--line);border-radius:3px;padding:0 4px;flex:0 0 auto;}
.cal-empty{color:var(--muted);font-size:13px;padding:4px 0;}

@media (min-width:768px) and (max-width:1199px){
  body{padding:20px;}
  .app{grid-template-columns:200px minmax(0,1fr)!important;}
  .sidebar{display:block!important;position:sticky!important;top:0!important;width:200px!important;height:100vh!important;}
  .app>main{padding:20px!important;min-width:0;}
  .wrap{max-width:100%;}
  .dq-grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .dq-overview{grid-template-columns:repeat(2,minmax(0,1fr));}
  .dq-nav-btn{padding:9px 14px;}
}

@media (max-width:767px){
  body{padding:0;background:#f5f2ea;}
  .app{display:block!important;}
  .app>main{padding:72px 14px 24px!important;min-width:0;}
  .app>main .wrap,.wrap{max-width:none!important;width:100%;}
  .mobile-topbar{display:flex;position:fixed;top:0;left:0;right:0;height:56px;z-index:1002;
    align-items:center;justify-content:space-between;padding:0 14px;background:#1d1a17;color:#fff;
    box-shadow:0 2px 12px rgba(0,0,0,.2);}
  .mobile-menu-btn{appearance:none;border:0;background:transparent;color:#fff;font-size:25px;line-height:1;
    padding:8px;margin-left:-8px;cursor:pointer;}
  .mobile-top-title{font-size:15px;font-weight:750;}
  .mobile-top-date{font-family:var(--mono);font-size:10px;color:#aaa49a;}
  .sidebar{display:block!important;position:fixed!important;inset:0 auto 0 0!important;width:min(82vw,300px)!important;
    height:100dvh!important;z-index:1004!important;transform:translateX(-105%);transition:transform .22s ease;
    overflow-y:auto!important;box-shadow:8px 0 30px rgba(0,0,0,.25);}
  body.mobile-nav-open .sidebar{transform:translateX(0);}
  .mobile-nav-mask{position:fixed;inset:0;z-index:1003;background:rgba(0,0,0,.46);}
  body.mobile-nav-open .mobile-nav-mask{display:block;}
  body.mobile-nav-open{overflow:hidden;}
  .page-title{font-size:25px;margin-bottom:6px;}
  .page-sub{font-size:12px;line-height:1.55;margin-bottom:13px;}
  .dq-runtime{display:grid;grid-template-columns:1fr;gap:6px;padding:11px 12px;}
  .dq-viewbar{align-items:flex-start;}
  .dq-viewhint{max-width:180px;line-height:1.4;}
  .dq-overview{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
  .dq-overview-card{padding:11px 12px;}
  .dq-overview-value{font-size:13px;}
  .dq-group-nav{flex-wrap:nowrap;overflow-x:auto;overscroll-behavior-x:contain;scrollbar-width:none;
    margin:0 -14px 20px;padding:10px 14px 12px;top:56px;box-shadow:0 3px 8px rgba(40,35,30,.05);}
  .dq-group-nav::-webkit-scrollbar{display:none;}
  .dq-nav-btn{flex:0 0 auto;padding:10px 14px;font-size:12px;}
  .dq-group{margin-bottom:24px;scroll-margin-top:118px;}
  .dq-group-head{font-size:14px;margin-bottom:9px;}
  .dq-grid{grid-template-columns:1fr;gap:10px;}
  .dq-card{padding:15px;border-radius:10px;}
  .dq-val{font-size:27px;}
  .dq-main{align-items:center;}
  .dq-sub-extra{display:none;}
  .dq-card.show-all-subs .dq-sub-extra{display:flex;}
  .dq-subs{grid-template-columns:1fr;}
  .dq-sub-toggle{display:block;}
  .dq-expand.open{margin-left:-4px;margin-right:-4px;}
  .dq-exp-chart{height:150px;touch-action:none;}
  .dq-click-hint{font-size:11px;}
  .cal-card{padding:13px 14px;}
  .cal-full{max-height:52vh;overflow-y:auto;}
  .dq-detail-summary{padding-top:14px;}

function meta(k){return METRIC_META[k]||{name:k,unit:"",dec:2};}

function unit(k){return meta(k).unit;}
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}
function deltaSpec(cur,prev,k){
  if(cur==null||prev==null)return {flat:true,text:'—',raw:null};
  const raw=cur-prev;
  if(Math.abs(raw)<1e-12)return {flat:true,text:'→ 0',raw};
  const rateLike=meta(k).unit==='%'&&(
    k.startsWith('rate.')||k.startsWith('bond.')||k.startsWith('bill.')||
    k.startsWith('ncd.')||(k.startsWith('spread.')&&k!=='spread.usdcny_spot_mid')
  );
  if(rateLike)return {flat:false,text:Math.abs(raw*100).toFixed(Math.abs(raw*100)>=10?1:2)+'bp',raw};
  if(k==='fx.usdcny'||k==='fx.usdcny_mid'||k==='spread.usdcny_spot_mid')
    return {flat:false,text:Math.abs(raw*10000).toFixed(0)+'基点',raw};
  if(k.startsWith('comm.')||k.startsWith('eq.')||k.startsWith('cash.')||k==='fx.dxy'){
    const pct=prev===0?0:raw/Math.abs(prev)*100;
    return {flat:false,text:Math.abs(pct).toFixed(2)+'%',raw};
  }
  return {flat:false,text:Math.abs(raw).toFixed(meta(k).dec),raw};
}

  if(k.startsWith('comm.')||k.startsWith('eq.')||k.startsWith('cash.')||k==='fx.dxy')
    return m.prev===0?0:raw/Math.abs(m.prev)*100;
  return raw;
}
function alertLevel(m,k){
  const rule=ALERT_RULES[k],mag=alertMagnitude(m,k);
  if(!rule||mag==null)return '';
  if(mag>=rule.danger)return 'danger';
  if(mag>=rule.watch)return 'watch';
  return '';
}

function sparkSVG(series,w=120,h=30){
  const pts=series.slice(-SPARK_DAYS).map(p=>p[1]).filter(v=>v!=null);
  if(pts.length<2)return '<svg class="dq-spark" width="'+w+'" height="'+h+'"></svg>';
  const lo=Math.min(...pts),hi=Math.max(...pts),rng=(hi-lo)||1,n=pts.length,co=[];
  for(let i=0;i<n;i++){const x=(i*(w-4)/(n-1)+2).toFixed(1);const y=(h-3-(pts[i]-lo)/rng*(h-6)).toFixed(1);co.push(x+','+y);}
  const up=pts[n-1]>=pts[0],color=up?'var(--dq-up)':'var(--dq-down)',last=co[n-1].split(',');
  return '<svg class="dq-spark" width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
    '<polyline fill="none" stroke="'+color+'" stroke-width="1.4" points="'+co.join(' ')+'"/>'+
    '<circle cx="'+last[0]+'" cy="'+last[1]+'" r="2" fill="'+color+'"/></svg>';
}

function compareMoveText(line,startValue,endValue){
  const info=deltaSpec(endValue,startValue,line.key);
  const startText=fmt(startValue,line.key)+unit(line.key),endText=fmt(endValue,line.key)+unit(line.key);
  if(info.flat)return line.name+'由'+startText+'至'+endText+'（持平）';
  const marketLike=line.key.startsWith('comm.')||line.key.startsWith('eq.')||line.key.startsWith('cash.');
  const verb=info.raw>0?(marketLike?'涨至':'升至'):(marketLike?'跌至':'降至');
  return line.name+'由'+startText+verb+endText+'（'+(info.raw>0?'+':'-')+info.text+'）';
}
function updateCompareInsight(body,lines,mode,rangeDays,commonDates){
  const insight=body.parentElement.querySelector('.dq-compare-insight');
  if(!insight)return;
  const rangeLabel=Number(rangeDays)>=365?'近1年':rangeDays+'日';
  if(!lines.length){insight.textContent='请选择指标后生成变化结论。';return;}
  const common=[...commonDates].sort();
  const startDate=common[0],endDate=common[common.length-1];
  if(!startDate||!endDate||startDate===endDate){insight.textContent='有效可比数据不足，暂不生成结论。';return;}
  const stats=lines.map(line=>{
    const start=line.series.find(p=>p[0]===startDate),end=line.series.find(p=>p[0]===endDate);
    if(!start||!end||start[1]==null||end[1]==null)return null;
    const raw=Number(end[1])-Number(start[1]);
    const pct=Number(start[1])===0?null:raw/Math.abs(Number(start[1]))*100;
    return {line,start:Number(start[1]),end:Number(end[1]),raw,pct};
  }).filter(Boolean);
  if(!stats.length){insight.textContent='有效可比数据不足，暂不生成结论。';return;}
  if(mode==='index'&&stats.length>1){
    const ranked=stats.filter(x=>x.pct!=null).sort((a,b)=>b.pct-a.pct);
    if(ranked.length<2){insight.textContent='有效可比数据不足，暂不生成结论。';return;}
    const best=ranked[0],worst=ranked[ranked.length-1],gap=best.pct-worst.pct;
    const indexedText=s=>s.line.name+'由'+fmt(s.start,s.line.key)+unit(s.line.key)+
      (s.pct>=0?'涨至':'跌至')+fmt(s.end,s.line.key)+unit(s.line.key)+
      '（'+(s.pct>=0?'+':'-')+Math.abs(s.pct).toFixed(2)+'%）';
    insight.innerHTML='<strong>'+rangeLabel+'：</strong>'+esc(indexedText(best))+
      '，'+esc(indexedText(worst))+'；前者相对更强 '+gap.toFixed(2)+' 个百分点。';
    return;
  }
  if(stats.length===1){
    const s=stats[0];
    insight.innerHTML='<strong>'+rangeLabel+'：</strong>'+esc(compareMoveText(s.line,s.start,s.end))+'。';
    return;
  }
  const ranked=stats.slice().sort((a,b)=>Math.abs(b.raw)-Math.abs(a.raw));
  const lead=ranked[0],second=ranked[1];
  insight.innerHTML='<strong>'+rangeLabel+'：</strong>'+esc(compareMoveText(lead.line,lead.start,lead.end))+
    '，'+esc(compareMoveText(second.line,second.start,second.end))+'；'+esc(lead.line.name)+'变动幅度最大。';
}
function drawMultiChart(body,payload,selected,mode='raw',rangeDays=30){
  const lines=selected.map(k=>({key:k,...payload[k]})).filter(x=>x&&x.series&&x.series.length>1);
  if(!lines.length){body.innerHTML='<div class="dq-exp-empty">请至少选择一个指标</div>';return;}
  const newest=lines.flatMap(x=>x.series.map(p=>p[0])).sort().pop();
  const cutoffDate=new Date(newest+'T00:00:00');
  cutoffDate.setDate(cutoffDate.getDate()-Math.max(1,Number(rangeDays)-1));
  const cutoff=cutoffDate.toISOString().slice(0,10);
  lines.forEach(x=>x.series=x.series.filter(p=>p[0]>=cutoff&&p[0]<=newest));
  const commonDates=lines.map(x=>new Set(x.series.map(p=>p[0]))).reduce((a,b)=>new Set([...a].filter(d=>b.has(d))));
  if(mode==='index'){

      x.plotSeries=x.series.map(p=>[p[0],bv?Number(p[1])/bv*100:null]);});
  }else lines.forEach(x=>x.plotSeries=x.series);
  updateCompareInsight(body,lines,mode,rangeDays,commonDates);
  const dateSet=new Set();lines.forEach(x=>x.plotSeries.forEach(p=>dateSet.add(p[0])));
  const dates=[...dateSet].sort(),dateIndex=new Map(dates.map((d,i)=>[d,i]));
  const vals=[];lines.forEach(x=>x.plotSeries.forEach(p=>{if(p[1]!=null)vals.push(Number(p[1]));}));

  const xFor=d=>x0+dateIndex.get(d)*(x1-x0)/(dates.length-1),yFor=v=>y1-(v-lo)/rng*(y1-y0);
  let paths='',dots='';
  lines.forEach(x=>{
    const pts=x.plotSeries.filter(p=>dateIndex.has(p[0])&&p[1]!=null).map(p=>[xFor(p[0]),yFor(Number(p[1]))]);
    paths+='<polyline fill="none" stroke="'+x.color+'" stroke-width="'+(x.primary?'2.2':'1.5')+
      '" points="'+pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')+'"/>';
    const last=pts[pts.length-1];if(last)dots+='<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.4" fill="'+x.color+'"/>';
  });
  const d0=dates[0].slice(5),dN=dates[dates.length-1].slice(5);
  const axisUnit=mode==='index'?'':(new Set(lines.map(x=>x.unit)).size===1?lines[0].unit:'');
  body.innerHTML='<svg class="dq-compare-chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">'+
    '<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y0+'" stroke="#e5dfd4"/>'+
    '<line x1="'+x0+'" y1="'+y1+'" x2="'+x1+'" y2="'+y1+'" stroke="#e5dfd4"/>'+
    '<text x="'+x0+'" y="11" class="dq-ax">'+hi.toFixed(mode==='index'?1:Math.max(...lines.map(x=>x.dec)))+axisUnit+'</text>'+
    '<text x="'+x0+'" y="'+(H-5)+'" class="dq-ax">'+d0+'</text><text x="'+x1+'" y="'+(H-5)+'" class="dq-ax" text-anchor="end">'+dN+'</text>'+
    paths+dots+
    '<line class="dq-cur" x1="0" y1="'+y0+'" x2="0" y2="'+y1+'" stroke="#aaa49a" stroke-width="1" stroke-dasharray="3,3" style="display:none"/>'+
    '<rect class="dq-hit" x="'+x0+'" y="'+y0+'" width="'+(x1-x0)+'" height="'+(y1-y0)+'" fill="transparent" style="cursor:crosshair"/></svg>';
  const svg=body.querySelector('svg'),hit=body.querySelector('.dq-hit'),cur=body.querySelector('.dq-cur'),tip=document.getElementById('dq-tip2');
  const show=function(ev){const br=svg.getBoundingClientRect(),mx=(ev.clientX-br.left)/br.width*W;
    const idx=Math.max(0,Math.min(dates.length-1,Math.round((mx-x0)/(x1-x0)*(dates.length-1)))),date=dates[idx],x=xFor(date);
    cur.setAttribute('x1',x);cur.setAttribute('x2',x);cur.style.display='';
    const parts=lines.map(s=>{const p=s.series.find(v=>v[0]===date);return p?'<span style="color:'+s.color+'">●</span> '+esc(s.name)+' '+Number(p[1]).toFixed(s.dec)+s.unit:'';}).filter(Boolean);
    tip.innerHTML='<b>'+date+'</b><br>'+parts.join('<br>');tip.style.left=ev.clientX+'px';tip.style.top=(ev.clientY-12)+'px';tip.style.display='block';};
  hit.addEventListener('pointermove',show);
  hit.addEventListener('pointerdown',show);
  hit.addEventListener('pointerleave',()=>{cur.style.display='none';tip.style.display='none';});
}

      drawMultiChart(panel.querySelector('.dq-compare-body'),payload,[...panel.querySelectorAll('.dq-series-btn.active')].map(x=>x.dataset.key),panel.dataset.mode||'raw',panel.dataset.range||30);
    });

  document.querySelectorAll('.dq-range-btn').forEach(btn=>{
    btn.addEventListener('click',function(ev){
      ev.stopPropagation();const panel=this.closest('.dq-compare');
      panel.dataset.range=this.dataset.days;
      panel.querySelectorAll('.dq-range-btn').forEach(x=>x.classList.toggle('active',x===this));
      let payload={};try{payload=JSON.parse(panel.getAttribute('data-series')||'{}');}catch(e){}
      const selected=[...panel.querySelectorAll('.dq-series-btn.active')].map(x=>x.dataset.key);
      drawMultiChart(panel.querySelector('.dq-compare-body'),payload,selected,panel.dataset.mode||'raw',panel.dataset.range||30);

function bindAlertNavigation(){
  document.querySelectorAll('[data-alert-key]').forEach(link=>{
    link.addEventListener('click',function(){
      const key=this.dataset.alertKey;
      const card=[...document.querySelectorAll('.dq-card[data-keys]')]
        .find(x=>(x.dataset.keys||'').split(' ').includes(key));
      if(!card)return;
      if(card.style.display==='none'||card.closest('.dq-group')?.style.display==='none')applyDailyView('all');
      card.classList.add('show-all-subs','dq-alert-target');
      const metric=[...card.querySelectorAll('.dq-metric')].find(x=>x.dataset.k===key);
      if(metric){
        const exp=card.querySelector('.dq-expand');
        if(!exp.classList.contains('open')||exp.dataset.cur!==metric.dataset.n)metric.click();
      }
      card.scrollIntoView({behavior:'smooth',block:'center'});
      window.setTimeout(()=>card.classList.remove('dq-alert-target'),2600);
    });
  });
}
function applyDailyView(view){
  currentDailyView=view==='all'?'all':'core';
  document.querySelectorAll('.dq-view-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.view===currentDailyView);
  });
  document.querySelectorAll('.dq-group').forEach(group=>{
    const cards=[...group.querySelectorAll('.dq-card')];
    cards.forEach(card=>{
      card.style.display=currentDailyView==='all'||card.dataset.core==='1'?'':'none';
    });
    const visible=cards.some(card=>card.style.display!=='none');
    group.style.display=visible?'':'none';
    const id=group.id.replace('dq-group-','');
    const navBtn=document.querySelector('.dq-nav-btn[data-group="'+id+'"]');
    if(navBtn)navBtn.style.display=visible?'':'none';
  });
}
function bindViewSwitch(){
  document.querySelectorAll('.dq-view-btn').forEach(btn=>{
    btn.addEventListener('click',()=>applyDailyView(btn.dataset.view));
  });
}
function bindResponsiveUI(latest){
  const mobileDate=document.getElementById('mobile-top-date');
  if(mobileDate)mobileDate.textContent=latest||'—';

  document.querySelectorAll('.dq-sub-toggle').forEach(btn=>{
    btn.addEventListener('click',function(ev){
      ev.stopPropagation();
      const card=btn.closest('.dq-card');
      const open=card.classList.toggle('show-all-subs');
      btn.textContent=open?'收起附属指标 ▴':'展开其余 '+card.querySelectorAll('.dq-sub-extra').length+' 项 ▾';
    });
  });

  const buttons=[...document.querySelectorAll('.dq-nav-btn')];
  const sections=[...document.querySelectorAll('.dq-group')];
  if('IntersectionObserver' in window&&buttons.length&&sections.length){
    const observer=new IntersectionObserver(entries=>{
      const visible=entries.filter(e=>e.isIntersecting).sort((a,b)=>a.boundingClientRect.top-b.boundingClientRect.top)[0];
      if(!visible)return;
      const id=visible.target.id.replace('dq-group-','');
      buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.group===id));
      const active=buttons.find(btn=>btn.dataset.group===id);
      if(active&&window.innerWidth<768){
        const rail=active.parentElement;
        rail.scrollTo({left:active.offsetLeft-(rail.clientWidth-active.offsetWidth)/2,behavior:'smooth'});
      }
    },{rootMargin:'-120px 0px -65% 0px',threshold:0});
    sections.forEach(section=>observer.observe(section));
  }
}

function setupMobileNav(){
  const btn=document.querySelector('.mobile-menu-btn');
  const mask=document.querySelector('.mobile-nav-mask');
  const close=()=>{
    document.body.classList.remove('mobile-nav-open');
    if(btn)btn.setAttribute('aria-expanded','false');
  };
  if(btn)btn.addEventListener('click',()=>{
    const open=document.body.classList.toggle('mobile-nav-open');
    btn.setAttribute('aria-expanded',String(open));
  });
  if(mask)mask.addEventListener('click',close);
  document.addEventListener('click',ev=>{
    if(ev.target.closest('.sidebar .sb-item'))close();
  });
  window.addEventListener('resize',()=>{if(window.innerWidth>=768)close();});
}

// ================= 取数: anon key fetch daily_metrics =================
function getAnonKey(){
  // 部署版: 只用文件里写死的 anon key, 不读浏览器存储、不弹框(避免多端不一致)。
  // 未替换占位符 → 返回空, 页面给出明确提示(而非弹框)。
  const k = SUPABASE_ANON_KEY;
  if(k && k!=="__ANON_KEY__" && k!=="PASTE_YOUR_ANON_KEY_HERE") return k;
  return "";
}
async function load(){
  try{
    const anonKey = getAnonKey();
    if(!anonKey){
      document.getElementById('content').innerHTML='<div class="dq-err">daily.html 里的 anon key 未填写(仍是占位符 __ANON_KEY__)。请在文件中替换为真实 anon key 后重新部署。</div>';
      return;
    }
    const sb=supabase.createClient(SUPABASE_URL,anonKey);
    // 取近400个自然日，支持30日 / 90日 / 近1年走势切换，并预留节假日余量。
    const since=new Date(Date.now()-HISTORY_CALENDAR_DAYS*864e5).toISOString().slice(0,10);
    // Supabase/PostgREST 默认单次最多返回1000行。当前36个指标×一年会超过
    // 上限，若不分页，按日期升序的结果会在月初被截断，页面看起来长期停留
    // 在旧日期。按稳定的 date+key 顺序逐页取完全部记录。
    const data=[]; const pageSize=1000;
    for(let from=0;;from+=pageSize){
      const {data:page,error}=await sb.from('daily_metrics')
        .select('date,key,name,value,source,updated_at')
        .gte('date',since)
        .order('date',{ascending:true})
        .order('key',{ascending:true})
        .range(from,from+pageSize-1);
      if(error)throw error;
      data.push(...(page||[]));
      if(!page||page.length<pageSize)break;
    }
    if(!data||!data.length){document.getElementById('content').innerHTML='<div class="dq-err">daily_metrics 暂无数据。请先在本地跑 push_daily_to_supabase.py 推送。</div>';return;}
    // 组织: byKey[key] = {value,date,prev,series:[[date,value]...]}
    const groups={},srcByKey={};let updatedAt='';let isCache=false;
    for(const r of data){
      (groups[r.key]=groups[r.key]||[]).push([r.date,r.value]);
      srcByKey[r.key]=r.source;
      if(r.updated_at&&r.updated_at>updatedAt)updatedAt=r.updated_at;
      if((r.source||'').includes('本轮使用API缓存'))isCache=true;
    }
    const byKey={};let latest='';
    for(const k in groups){const s=groups[k];const last=s[s.length-1];
      byKey[k]={value:last[1],date:last[0],prev:s.length>1?s[s.length-2][1]:null,series:s,source:srcByKey[k]};
      if(last[0]>latest)latest=last[0];}
    render(byKey,latest,updatedAt,isCache);
  }catch(e){
    const msg=(e&&(e.message||e.hint||''))+'';
    if(/api key|JWT|401|invalid|unauthor/i.test(msg)){
      document.getElementById('content').innerHTML='<div class="dq-err">anon key 无效或权限不足: '+esc(msg)+'<br>检查 daily.html 里的 anon key 是否为当前有效的只读 key(roll 过则旧 key 失效)。</div>';
    }else{
      document.getElementById('content').innerHTML='<div class="dq-err">加载失败: '+esc(msg)+'<br>检查 RLS 是否允许 anon 只读、网络是否能访问 Supabase。</div>';
    }
  }
}

function renderCalendar(data){
  const wrap=document.getElementById('calendar-card');
  if(!wrap)return;
  const days=(data&&data.days)||[];
  if(!days.length){wrap.innerHTML='';return;}
  const today=new Date().toISOString().slice(0,10);
  function evInner(e){
    const imp=e.importance>=3?'imp3':(e.importance===2?'imp2':'imp1');
    const time=e.hm?'<span class="cal-ev-time">'+esc(e.hm)+'</span>':'';
    const region=e.region?'<span class="cal-ev-region">'+esc(e.region)+'</span>':'';
    const name=esc(e.event||e.indicator||'');
    const nameHTML=e.link?'<a href="'+esc(e.link)+'" target="_blank" rel="noopener">'+name+'</a>':name;
    return '<span class="cal-dot '+imp+'"></span>'+time+region+'<span class="cal-ev-name">'+nameHTML+'</span>';
  }
  let fullRows='', total=0;
  for(const d of days){
    const isToday=d.date===today;
    const evs=(d.events||[]); total+=evs.length;
    const evHTML=evs.length?evs.map(e=>'<div class="cal-ev">'+evInner(e)+'</div>').join(''):'<div class="cal-empty">—</div>';
    fullRows+='<div class="cal-day"><div class="cal-day-head'+(isToday?' today':'')+'">'+
      esc(d.date)+(d.weekday?' 周'+esc(d.weekday):'')+(isToday?' · 今天':'')+'</div>'+evHTML+'</div>';
  }
  let near=null,nd=null,nwd=null,nToday=false;
  for(const d of days){ if(d.events&&d.events.length){ near=d.events[0]; nd=d.date; nwd=d.weekday; nToday=(d.date===today); break; } }
  let summary='';
  if(near){
    const dateStr=esc(nd)+(nToday?' 今天':(nwd?' 周'+esc(nwd):''));
    summary='<div class="cal-ev cal-sum-ev"><span class="cal-sum-date'+(nToday?' today':'')+'">'+dateStr+'</span>'+evInner(near)+'</div>';
  }
  const label='展开全部 '+total+' 项 ▾';
  const toggle=total>1?'<span class="cal-toggle" data-open="'+label+'">'+label+'</span>':'';
  wrap.innerHTML=
    '<div class="cal-card">'+
      '<div class="cal-head" onclick="toggleCal(this)">'+
        '<span class="cal-head-title">本周关键数据发布</span>'+toggle+
      '</div>'+
      '<div class="cal-summary">'+summary+'</div>'+
      '<div class="cal-full" style="display:none">'+fullRows+'</div>'+
    '</div>';
}
window.toggleCal=function(head){
  const card=head.closest('.cal-card'); if(!card)return;
  const full=card.querySelector('.cal-full'), sum=card.querySelector('.cal-summary'), tog=head.querySelector('.cal-toggle');
  const open=full.style.display!=='none';
  if(open){ full.style.display='none'; sum.style.display='block'; if(tog)tog.textContent=tog.dataset.open; }
  else { full.style.display='block'; sum.style.display='none'; if(tog)tog.textContent='收起 ▴'; }
};
async function loadCalendar(){
  try{
    const r=await fetch('calendar_week.json',{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    renderCalendar(await r.json());
  }catch(e){
    const wrap=document.getElementById('calendar-card');
    if(wrap)wrap.innerHTML='';
  }
}
loadCalendar();
setupMobileNav();
