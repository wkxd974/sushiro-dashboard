var BANU_EXCLUDED_STORES_NORM = BANU_EXCLUDED_STORES.map(function(s){return s.replace(/[-]?闭$/,'').replace(/-闭\）$/,'）');});

var S_COLORS = ['#C47A6C','#7B6478','#6A967A','#A8845C','#8B6E99'];
var B_COLORS = ['#A06850','#6B8A6B','#8A7260','#7A85A0'];

/* ===========================================================
   Data stores
   =========================================================== */
var sushiroDaily = [], banuDaily = [], banuCityMon = [], storeBase = [];
var hdlNational = {}, hdlCity = {};
var datesByMonth = { s: {}, b: {} };
var allCities = { s: [], b: [], t: [] };
var monthList = { s: [], b: [] };
var charts = {};  // ECharts instances by id

/* ===========================================================
   State
   =========================================================== */
var curSection = 'sushiro';
var curSubTab = { sushiro: 'city', banu: 'city' };
var filters = {
  s: {month:'全部', city:'全部', from:'', to:''},
  b: {month:'全部', city:'全部', from:'', to:''},
  t: {city:'', from:'', to:''}
};

/* ===========================================================
   Utility
   =========================================================== */
function isBanuExcludedStore(name){
  if(!name) return false;
  var n = name.replace(/[-]?闭$/,'').replace(/-闭\）$/,'）');
  return BANU_EXCLUDED_STORES_NORM.indexOf(n)>=0 || BANU_EXCLUDED_STORES.indexOf(name)>=0;
}
function normCity(c){ return (c||'').replace(/市$/,''); }
function cityMatch(d, f){ return f==='全部' || !f || normCity(d)===normCity(f); }
function fmtInt(v){ return v==null?'-':Math.round(v).toLocaleString(); }
function fmtPct(v){ return v==null?'-':(v*100).toFixed(1)+'%'; }
function fmtRate(v){ return v==null?'-':(+v).toFixed(1); }
function fmtRate2(v){ return v==null?'-':(+v).toFixed(2); }
function fmtMoney(v){ return v==null?'-':'¥'+Math.round(v).toLocaleString(); }
function fmtMoneyW(v){ return v==null?'-':(v/10000).toFixed(0)+'万'; }
function stripBrandName(name, brand){
  if(!name) return '';
  var s = name.replace(brand, '');
  s = s.replace(/^[（(]/, '').replace(/[）)]$/, '');
  s = s.replace(/[-]?闭$/, '');
  return s.trim() || name;
}
function turnBadge(rate, avg){
  var diff = (rate||0) - (avg||0);
  return diff > 2 ? 'bg-g' : diff >= 0 ? 'bg-o' : 'bg-r';
}
function monthLastDay(m){
  var y = parseInt(m.slice(0,4)), mo = parseInt(m.slice(5,7));
  var d = new Date(y, mo, 0).getDate();
  return m+'-'+String(d).padStart(2,'0');
}
function storeBaseCountByCity(monthStr){
  var end = monthStr ? monthLastDay(monthStr) : '9999-12-31';
  var counts = {}, total = 0;
  storeBase.forEach(function(s){
    if(s.status !== '开业') return;
    if(s.open_date && s.open_date > end) return;
    var c = normCity(s.city || '');
    if(!c) return;
    if(!counts[c]) counts[c] = 0;
    counts[c]++; total++;
  });
  return {byCity: counts, total: total};
}

/* ===========================================================
   Supabase
   =========================================================== */
function supa(table, params){
  var url = SUPA_URL + '/rest/v1/' + table + '?select=*' + (params||'');
  return fetch(url, {headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}}).then(function(r){return r.json();});
}
function supaAll(table, order){
  var PAGE = 10000;
  function page(off){
    return fetch(SUPA_URL+'/rest/v1/'+table+'?select=*&order='+order+'&limit='+PAGE+'&offset='+off, {headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}}).then(function(r){return r.json();});
  }
  return page(0).then(function(first){
    if(!Array.isArray(first)) return [];
    if(first.length < PAGE) return first;
    function next(off, acc){
      return page(off).then(function(d){
        if(!Array.isArray(d) || !d.length) return acc;
        acc = acc.concat(d);
        if(d.length < PAGE) return acc;
        return next(off+PAGE, acc);
      });
    }
    return next(PAGE, first);
  });
}

/* ===========================================================
   Data loading
   =========================================================== */
function loadAllData(){
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spin"></div><div style="margin-top:14px">加载数据...</div></div>';
  document.getElementById('dataInfo').textContent = '';
  Promise.all([
    supaAll('store_daily', 'date.desc,city.asc'),
    supaAll('banu_store_daily', 'date.desc,city.asc'),
    supa('banu_city_monthly', '&order=month.desc,city.asc'),
    supa('store_base', '&order=city.asc'),
    supa('hdl_national_turnover', '&order=date.asc'),
    supa('hdl_city_turnover', '&order=date.asc,city.asc')
  ]).then(function(rs){
    sushiroDaily = Array.isArray(rs[0]) ? rs[0] : [];
    banuDaily = Array.isArray(rs[1]) ? rs[1] : [];
    banuCityMon = Array.isArray(rs[2]) ? rs[2] : [];
    storeBase = Array.isArray(rs[3]) ? rs[3] : [];

    hdlNational = {};
    (Array.isArray(rs[4]) ? rs[4] : []).forEach(function(r){
      if(r.date && r.turnover_rate != null) hdlNational[r.date] = r.turnover_rate;
    });
    hdlCity = {};
    (Array.isArray(rs[5]) ? rs[5] : []).forEach(function(r){
      if(r.date && r.city && r.turnover_rate != null){
        if(!hdlCity[r.date]) hdlCity[r.date] = {};
        hdlCity[r.date][r.city] = r.turnover_rate;
      }
    });

    var total = sushiroDaily.length + banuDaily.length;
    document.getElementById('dataInfo').textContent = total.toLocaleString()+' 条';

    initCaches();
    renderCurrentSection();
  }).catch(function(e){
    document.getElementById('content').innerHTML = '<div class="empty">数据加载失败<br><small style="color:#aaa">'+(e&&e.message||'')+'</small></div>';
  });
}

function initCaches(){
  // Sushiro: dates by month, months, cities
  datesByMonth.s = {};
  var sCities = {};
  sushiroDaily.forEach(function(d){
    if(d.date){
      var m = d.date.slice(0,7);
      if(!datesByMonth.s[m]) datesByMonth.s[m] = [];
      if(datesByMonth.s[m].indexOf(d.date)===-1) datesByMonth.s[m].push(d.date);
    }
    if(d.city){
      var c = normCity(d.city);
      if(c && c!=='总计') sCities[c] = 1;
    }
  });
  Object.keys(datesByMonth.s).forEach(function(m){ datesByMonth.s[m].sort(); });
  monthList.s = Object.keys(datesByMonth.s).sort();
  allCities.s = Object.keys(sCities).sort();

  // Banu: dates by month, months, cities
  datesByMonth.b = {};
  var bCities = {};
  banuDaily.forEach(function(d){
    if(d.date){
      var m = d.date.slice(0,7);
      if(!datesByMonth.b[m]) datesByMonth.b[m] = [];
      if(datesByMonth.b[m].indexOf(d.date)===-1) datesByMonth.b[m].push(d.date);
    }
    if(d.city && BANU_EXCLUDED_CITIES.indexOf(d.city)<0 && !isBanuExcludedStore(d.store_name)) bCities[d.city] = 1;
  });
  Object.keys(datesByMonth.b).forEach(function(m){ datesByMonth.b[m].sort(); });
  monthList.b = Object.keys(datesByMonth.b).sort();
  allCities.b = Object.keys(bCities).sort();

  // Turnover: cities from HDL city data
  var tCities = {};
  Object.keys(hdlCity).forEach(function(d){
    Object.keys(hdlCity[d]).forEach(function(c){ tCities[c]=1; });
  });
  allCities.t = Object.keys(tCities).sort();

  // Default filter values
  if(monthList.s.length){
    filters.s.month = monthList.s[monthList.s.length-1];
    var ds = datesByMonth.s[filters.s.month];
    filters.s.from = ds[0]; filters.s.to = ds[ds.length-1];
  }
  if(monthList.b.length){
    filters.b.month = monthList.b[monthList.b.length-1];
    var db = datesByMonth.b[filters.b.month];
    filters.b.from = db[0]; filters.b.to = db[db.length-1];
  }
  var tDates = Object.keys(hdlNational).sort();
  if(tDates.length){
    filters.t.from = tDates[0];
    filters.t.to = tDates[tDates.length-1];
  } else {
    filters.t.from = '2026-04-14';
    filters.t.to = new Date().toISOString().slice(0,10);
  }
}

/* ===========================================================
   Navigation
   =========================================================== */
function navTo(sec){
  curSection = sec;
  document.querySelectorAll('.bottom-nav .nav-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-section')===sec);
  });
  var titles = {sushiro:'🍣 寿司郎', banu:'🌶️ 巴奴', turnover:'📊 翻台率对比'};
  document.getElementById('pageTitle').textContent = titles[sec];
  // Dispose existing charts to avoid resize issues
  Object.keys(charts).forEach(function(k){ try{ charts[k].dispose(); }catch(e){} });
  charts = {};
  renderCurrentSection();
}

function renderCurrentSection(){
  if(curSection === 'sushiro') renderSushiro();
  else if(curSection === 'banu') renderBanu();
  else if(curSection === 'turnover') renderTurnover();
}

function buildSushiroFilters(){
  var f = filters.s;
  var html = '';
  html += '<div class="fg"><label>月份</label><select id="sf-month" onchange="onSMonth(this.value)">';
  html += '<option'+(f.month==='全部'?' selected':'')+'>全部</option>';
  monthList.s.forEach(function(m){ html += '<option'+(m===f.month?' selected':'')+'>'+m+'</option>'; });
  html += '</select></div>';

function renderSCity(){
  var f = filters.s;
  var dd = sushiroDaily.filter(function(r){
    return cityMatch(r.city, f.city) && (!f.from || r.date>=f.from) && (!f.to || r.date<=f.to);
  });
  var cg = {};
  dd.forEach(function(r){
    if(!r.city) return;
    var nc = normCity(r.city);
    if(!cg[nc]) cg[nc] = {city:nc, stores:{}, dates:{}, rev:0, tables:0, qh:0, q50h:0, bh:0, turnSum:0, turnN:0};
    cg[nc].stores[r.store_id||r.store_name]=1;
    cg[nc].dates[r.date]=1;
    cg[nc].rev += (r.daily_sales_revenue||0);
    cg[nc].tables += (r.daily_sales_tables||0);
    cg[nc].qh += (r.queue_hours||0);
    cg[nc].q50h += (r.queue50_hours||0);
    cg[nc].bh += (r.biz_hours||0);
    cg[nc].turnSum += (r.daily_turnover_rate||0);
    cg[nc].turnN++;
  });
  var d = Object.values(cg).map(function(c){
    var ns = Object.keys(c.stores).length, nd = Object.keys(c.dates).length;
    return {
      city: c.city, store_count: ns, data_days: nd,
      daily_avg_sales_tables: ns&&nd ? c.tables/nd/ns : 0,
      daily_avg_sales_revenue: ns&&nd ? c.rev/nd/ns : 0,
      monthly_turnover_rate: c.turnN ? c.turnSum/c.turnN : 0,
      queue_hour_pct: c.bh ? c.qh/c.bh : 0,
      queue50_hour_pct: c.bh ? c.q50h/c.bh : 0,
      total_sales_revenue: c.rev
    };
  });
  document.getElementById('sf-info').textContent = '城市: '+d.length+' 个 ('+dd.length+' 条日数据)';

  var c = document.getElementById('content');
  if(!d.length){ c.innerHTML = '<div class="empty">所选范围内暂无数据</div>'; return; }

  var n = d.length;
  var sumRev = d.reduce(function(s,r){return s+(r.total_sales_revenue||0);}, 0);
  var avgTurn = d.reduce(function(s,r){return s+r.monthly_turnover_rate;}, 0)/n;
  var avgQueue = d.reduce(function(s,r){return s+r.queue_hour_pct;}, 0)/n;
  var avgQ50 = d.reduce(function(s,r){return s+r.queue50_hour_pct;}, 0)/n;

  var cmMonth = f.month!=='全部' ? f.month : (f.from?f.from.slice(0,7):'');

  var html = '';
  html += '<div class="kpi-grid">';
  html += '<div class="kpi"><div class="kl">累计不含税收入下限</div><div class="kv">¥'+(sumRev/10000).toFixed(0)+'万</div><div class="ks">'+n+' 城合计</div></div>';
  html += '<div class="kpi"><div class="kl">平均翻台率下限</div><div class="kv">'+avgTurn.toFixed(1)+'</div></div>';
  html += '<div class="kpi"><div class="kl">平均排号时段占比<small>有排号小时÷营业小时</small></div><div class="kv">'+(avgQueue*100).toFixed(1)+'%</div></div>';
  html += '<div class="kpi"><div class="kl">排50号以上占比<small>排号≥50小时÷营业小时</small></div><div class="kv">'+(avgQ50*100).toFixed(1)+'%</div></div>';
  html += '<div class="kpi"><div class="kl">营业门店数</div><div class="kv">'+totalStores+'</div></div>';
  html += '</div>';

  html += '<div class="card"><h3>城市日均翻台率下限排行</h3><div class="desc">📊 所选日期范围内日均翻台率下限</div><div id="sc-turn" class="chart"></div></div>';
  html += '<div class="card"><h3>城市日均单店销售桌数排行</h3><div class="desc">📊 总桌数 ÷ 数据天数 ÷ 门店数</div><div id="sc-tbl" class="chart"></div></div>';
  html += '<div class="card"><h3>城市日均单店不含税收入排行</h3><div class="desc">📊 总收入 ÷ 数据天数 ÷ 门店数</div><div id="sc-rev" class="chart"></div></div>';

  html += '<div class="card"><h3>城市月滚动汇总明细</h3><div class="note gray" style="margin-bottom:10px">⚠️ 预估假设：单桌用餐 <b>57.5分钟</b>，桌均 <b>2.5人</b></div><div id="sc-list"></div></div>';
  c.innerHTML = html;

  // Build bar charts (sorted desc, taller chart for many cities)
  var sorted1 = d.slice().sort(function(a,b){return b.monthly_turnover_rate-a.monthly_turnover_rate;});
  drawBarH('sc-turn', sorted1, 'monthly_turnover_rate', 'city', S_COLORS[0], fmtRate);
  var sorted2 = d.slice().sort(function(a,b){return b.daily_avg_sales_tables-a.daily_avg_sales_tables;});
  drawBarH('sc-tbl', sorted2, 'daily_avg_sales_tables', 'city', S_COLORS[1], fmtInt);
  var sorted3 = d.slice().sort(function(a,b){return b.daily_avg_sales_revenue-a.daily_avg_sales_revenue;});
  drawBarH('sc-rev', sorted3, 'daily_avg_sales_revenue', 'city', S_COLORS[2], fmtMoney);

  // Detail list (card-style for mobile)
  var lst = document.getElementById('sc-list');

    var tb = turnBadge(r.monthly_turnover_rate, avgTurn);

    card.innerHTML = '<div class="row-title">'+r.city+'<small>'+r.store_count+' 店</small></div>'
      +'<div class="row-fields">'
      +'<div class="field"><span class="field-label">日均桌数</span><span class="field-value">'+fmtInt(r.daily_avg_sales_tables)+'</span></div>'
      +'<div class="field"><span class="field-label">日均收入</span><span class="field-value">'+fmtMoney(r.daily_avg_sales_revenue)+'</span></div>'
      +'<div class="field"><span class="field-label">翻台率</span><span class="field-value"><span class="badge '+tb+'">'+fmtRate(r.monthly_turnover_rate)+'</span></span></div>'
      +'<div class="field"><span class="field-label">排号占比</span><span class="field-value">'+fmtPct(r.queue_hour_pct)+'</span></div>'
      +'<div class="field"><span class="field-label">≥50号占比</span><span class="field-value">'+fmtPct(r.queue50_hour_pct)+'</span></div>'
      +'</div>';
    lst.appendChild(card);
  });
}

function filterSStore(){

  if(rows.length > 80){
    var more = document.createElement('div');

function renderSTrend(){
  var f = filters.s;
  var dd = sushiroDaily.filter(function(r){
    return cityMatch(r.city, f.city) && (!f.from || r.date>=f.from) && (!f.to || r.date<=f.to);
  });
  document.getElementById('sf-info').textContent = '趋势: '+dd.length+' 条';

  var c = document.getElementById('content');
  if(!dd.length){ c.innerHTML = '<div class="empty">所选范围内暂无数据</div>'; return; }

  var g = {};
  dd.forEach(function(r){
    if(!g[r.date]) g[r.date] = {rev:0, tables:0, qh:0, bh:0, n:0, turnSum:0, turnN:0};
    g[r.date].rev += (r.daily_sales_revenue||0);
    g[r.date].tables += (r.daily_sales_tables||0);
    g[r.date].qh += (r.queue_hours||0);
    g[r.date].bh += (r.biz_hours||0);
    g[r.date].n++;
    if(r.daily_turnover_rate>0){ g[r.date].turnSum += r.daily_turnover_rate; g[r.date].turnN++; }
  });
  var startD = f.from || Object.keys(g).sort()[0];
  var endD = f.to || Object.keys(g).sort().pop();
  var fullDates = expandDates(startD, endD);
  var labels = fullDates.map(function(d){return d.slice(5);});
  var tablesArr = fullDates.map(function(d){var o=g[d];return o&&o.n?o.tables/o.n:null;});
  var revArr = fullDates.map(function(d){var o=g[d];return o&&o.n?o.rev/o.n:null;});
  var queueArr = fullDates.map(function(d){var o=g[d];return o&&o.bh?(o.qh/o.bh)*100:null;});
  var turnArr = fullDates.map(function(d){var o=g[d];return o&&o.turnN?o.turnSum/o.turnN:null;});
  var cumArr = []; var cum = 0;
  fullDates.forEach(function(d){var o=g[d]; if(o){cum += o.rev; cumArr.push(cum);} else cumArr.push(null);});

  var missing = fullDates.filter(function(d){return !g[d];});
  var html = '';
  if(missing.length){
    html += '<div class="note">⚠ 所选 '+fullDates.length+' 天中 '+(fullDates.length-missing.length)+' 天有数据，'+missing.length+' 天暂无数据</div>';
  }
  html += '<div class="card"><h3>日均单店销售桌数趋势</h3><div id="st-1" class="chart"></div></div>';
  html += '<div class="card"><h3>日均单店不含税收入趋势</h3><div id="st-2" class="chart"></div></div>';
  html += '<div class="card"><h3>排号时段占比趋势</h3><div id="st-3" class="chart"></div></div>';
  html += '<div class="card"><h3>日均翻台率下限趋势</h3><div id="st-4" class="chart"></div></div>';
  html += '<div class="card"><h3>当月累计不含税收入</h3><div id="st-5" class="chart"></div></div>';
  c.innerHTML = html;

  drawLine('st-1', labels, tablesArr, S_COLORS[0], '日均桌数', function(v){return Math.round(v)+'桌';}, function(v){return Math.round(v);});
  drawLine('st-2', labels, revArr, S_COLORS[1], '日均收入', fmtMoney, function(v){return (v/10000).toFixed(0)+'万';});
  drawLine('st-3', labels, queueArr, S_COLORS[2], '排号占比', function(v){return v.toFixed(1)+'%';}, function(v){return v.toFixed(0)+'%';});
  drawLine('st-4', labels, turnArr, S_COLORS[3], '翻台率', function(v){return v.toFixed(2);}, function(v){return v.toFixed(1);});
  drawLine('st-5', labels, cumArr, S_COLORS[4], '累计收入', fmtMoney, function(v){return (v/10000).toFixed(0)+'万';});
}

function renderBTrend(){
  var f = filters.b;
  var dd = banuDaily.filter(function(r){
    if(BANU_EXCLUDED_CITIES.indexOf(r.city)>=0) return false;
    if(isBanuExcludedStore(r.store_name)) return false;
    return cityMatch(r.city, f.city) && (!f.from||r.date>=f.from) && (!f.to||r.date<=f.to);
  });
  document.getElementById('bf-info').textContent = '趋势: '+dd.length+' 条';

  var c = document.getElementById('content');
  if(!dd.length){ c.innerHTML = '<div class="empty">所选范围内暂无数据</div>'; return; }

  var g = {};
  dd.forEach(function(r){
    if(!g[r.date]) g[r.date] = {tables:0, qh:0, bh:0, turnSum:0, n:0, totalQueue:0};
    g[r.date].tables += (r.daily_sales_tables||0);
    g[r.date].qh += (r.queue_hours||0); g[r.date].bh += (r.biz_hours||0);
    g[r.date].turnSum += (r.daily_turnover_rate||0); g[r.date].n++;
    g[r.date].totalQueue += (r.total_queue||0);
  });
  var startD = f.from || Object.keys(g).sort()[0];
  var endD = f.to || Object.keys(g).sort().pop();
  var fullDates = expandDates(startD, endD);
  var labels = fullDates.map(function(d){return d.slice(5);});
  var tablesArr = fullDates.map(function(d){
    if(BANU_EXCLUDED_DATES.indexOf(d)>=0) return null;
    var o = g[d]; return o&&o.n ? o.tables/o.n : null;
  });
  var turnArr = fullDates.map(function(d){
    if(BANU_EXCLUDED_DATES.indexOf(d)>=0) return null;
    var o = g[d]; return o&&o.n ? o.turnSum/o.n : null;
  });
  var queueArr = fullDates.map(function(d){
    if(BANU_EXCLUDED_DATES.indexOf(d)>=0) return null;
    var o = g[d]; return o&&o.bh ? (o.qh/o.bh)*100 : null;
  });
  var qNumArr = fullDates.map(function(d){
    if(BANU_EXCLUDED_DATES.indexOf(d)>=0) return null;
    var o = g[d]; return o&&o.n ? o.totalQueue/o.n : null;
  });

  var excludedInRange = BANU_EXCLUDED_DATES.filter(function(d){return d>=startD&&d<=endD;});
  var html = '';
  if(excludedInRange.length){
    html += '<div class="note">'+BANU_EXCLUDED_NOTE+'<br>📉 趋势图中对应日期为断点</div>';
  }
  html += '<div class="card"><h3>日均单店销售桌数趋势</h3><div id="bt-1" class="chart"></div></div>';
  html += '<div class="card"><h3>日均翻台率预估趋势</h3><div class="desc">📊 基于小程序排号推算</div><div id="bt-2" class="chart"></div></div>';
  html += '<div class="card"><h3>排号时段占比趋势</h3><div id="bt-3" class="chart"></div></div>';
  html += '<div class="card"><h3>日均单店排号数趋势</h3><div id="bt-4" class="chart"></div></div>';
  c.innerHTML = html;

  drawLine('bt-1', labels, tablesArr, B_COLORS[0], '日均桌数', function(v){return Math.round(v)+'桌';}, function(v){return Math.round(v);});
  drawLine('bt-2', labels, turnArr, B_COLORS[1], '翻台率预估', function(v){return v.toFixed(2);}, function(v){return v.toFixed(1);});
  drawLine('bt-3', labels, queueArr, B_COLORS[2], '排号占比', function(v){return v.toFixed(1)+'%';}, function(v){return v.toFixed(0)+'%';});
  drawLine('bt-4', labels, qNumArr, B_COLORS[3], '日均排号', function(v){return Math.round(v)+'号';}, function(v){return Math.round(v);});
}

   Turnover comparison
   =========================================================== */
function renderTurnover(){
  document.getElementById('subTabs').innerHTML = '';
  buildTurnoverFilters();
  renderTurnoverBody();
}
function renderTurnoverBody(){
  var f = filters.t;
  var c = document.getElementById('content');
  if(!banuDaily.length && !Object.keys(hdlNational).length){
    c.innerHTML = '<div class="empty">数据未加载</div>'; return;
  }

  // Banu daily averages
  var banuMap = {};
  banuDaily.forEach(function(r){
    if(!r.date || !r.store_name || isBanuExcludedStore(r.store_name)) return;
    if(f.city){
      if(r.city !== f.city) return;
    } else {
      if(BANU_EXCLUDED_CITIES.indexOf(r.city)>=0) return;
    }
    var rate = r.daily_turnover_rate;
    if(rate==null || rate<=0) return;
    if(!banuMap[r.date]) banuMap[r.date] = {sum:0, count:0};
    banuMap[r.date].sum += rate; banuMap[r.date].count++;
  });

  // HDL data
  var hdlMap = {};
  if(f.city){
    Object.keys(hdlCity).forEach(function(d){
      if(hdlCity[d][f.city] !== undefined) hdlMap[d] = hdlCity[d][f.city];
    });
  } else {
    hdlMap = Object.assign({}, hdlNational);
  }

  // All dates union
  var dateSet = {};
  Object.keys(banuMap).forEach(function(d){ dateSet[d]=1; });
  Object.keys(hdlMap).forEach(function(d){ dateSet[d]=1; });
  var dates = Object.keys(dateSet).filter(function(d){
    return (!f.from||d>=f.from) && (!f.to||d<=f.to);
  }).sort();

  if(!dates.length){
    c.innerHTML = '<div class="card"><h3>'+(f.city||'全国')+' 翻台率对比</h3><div class="empty">所选范围内暂无数据</div></div>'
      +'<div class="note blue" style="margin-top:12px">📌 海底捞数据来源：当前仅包含 Supabase 中 2026-04-14 起的增量数据。如需更早历史数据，请从 PC 版查看（已包含历史导入数据）。</div>';
    return;
  }

  var labels = dates.map(function(d){return d.slice(5);});
  var banuArr = dates.map(function(d){
    var o = banuMap[d]; return o&&o.count ? +(o.sum/o.count).toFixed(2) : null;
  });
  var hdlArr = dates.map(function(d){
    return hdlMap[d] !== undefined ? +(+hdlMap[d]).toFixed(2) : null;
  });

  var html = '';
  html += '<div class="card"><h3>'+(f.city||'全国')+' 翻台率对比</h3><div class="desc">巴奴 vs 海底捞，按日</div><div id="t-chart" class="chart tall"></div></div>';
  html += '<div class="note blue">📌 海底捞数据来源：仅 Supabase 增量（2026-04-14 起）。如需早期历史，请从 PC 版查看。</div>';
  html += '<div class="card"><h3>每日明细</h3><div id="t-list"></div></div>';
  c.innerHTML = html;

  // Comparison line chart
  var dom = document.getElementById('t-chart');
  if(charts['t-chart']){ try{charts['t-chart'].dispose();}catch(e){} }
  charts['t-chart'] = echarts.init(dom);
  charts['t-chart'].setOption({
    tooltip: {trigger:'axis', confine:true, textStyle:{fontSize:12}},
    legend: {data:['巴奴','海底捞'], top:0, textStyle:{fontSize:11}, itemWidth:14, itemHeight:8},
    grid: {left:36, right:14, top:30, bottom:32},
    xAxis: {type:'category', data:labels, axisLabel:{fontSize:10, interval:Math.max(0, Math.floor(labels.length/8))}, boundaryGap:false},
    yAxis: {type:'value', axisLabel:{fontSize:10}, splitLine:{lineStyle:{color:'#f0f0f0'}}},
    series: [
      {name:'巴奴', type:'line', data:banuArr, color:'#A06850', smooth:true, symbol:'circle', symbolSize:4, lineStyle:{width:2}, connectNulls:true},
      {name:'海底捞', type:'line', data:hdlArr, color:'#E04040', smooth:true, symbol:'circle', symbolSize:4, lineStyle:{width:2}, connectNulls:true}
    ]
  });

  // Detail list (newest first)
  var lst = document.getElementById('t-list');
  dates.slice().reverse().forEach(function(d){
    var b = banuMap[d] && banuMap[d].count ? +(banuMap[d].sum/banuMap[d].count).toFixed(2) : null;
    var h = hdlMap[d] !== undefined ? +(+hdlMap[d]).toFixed(2) : null;
    var card = document.createElement('div');
    card.className = 'row-card';
    card.innerHTML = '<div class="row-title">'+d+'</div>'
      +'<div class="row-fields">'
      +'<div class="field"><span class="field-label">巴奴</span><span class="field-value" style="color:#A06850">'+(b!=null?b:'-')+'</span></div>'
      +'<div class="field"><span class="field-label">海底捞</span><span class="field-value" style="color:#E04040">'+(h!=null?h:'-')+'</span></div>'
      +'</div>';
    lst.appendChild(card);
  });
}

function drawBarH(id, items, valKey, labelKey, color, fmt){
  var dom = document.getElementById(id);
  if(!dom) return;
  if(charts[id]){ try{charts[id].dispose();}catch(e){} }
  // Adjust height to # of bars
  var n = items.length;
  var h = Math.max(220, Math.min(640, 28*n + 50));
  dom.style.height = h+'px';
  charts[id] = echarts.init(dom);
  var labels = items.map(function(r){return r[labelKey];});
  var values = items.map(function(r){return r[valKey];});
  charts[id].setOption({
    grid: {left:6, right:50, top:8, bottom:6, containLabel:true},
    tooltip: {trigger:'axis', axisPointer:{type:'shadow'}, confine:true, formatter:function(p){return p[0].name+'<br>'+fmt(p[0].value);}, textStyle:{fontSize:12}},
    xAxis: {type:'value', axisLine:{show:false}, axisTick:{show:false}, splitLine:{lineStyle:{color:'#f5f5f5'}}, axisLabel:{fontSize:10, color:'#999'}},
    yAxis: {type:'category', data:labels.slice().reverse(), axisLine:{show:false}, axisTick:{show:false}, axisLabel:{fontSize:11, color:'#444', interval:0}},
    series: [{
      type:'bar', data:values.slice().reverse(), itemStyle:{color:color, borderRadius:[0,3,3,0]},
      barMaxWidth:18, barCategoryGap:'30%',
      label: {show:true, position:'right', fontSize:10, color:'#666', formatter:function(p){return fmt(p.value);}}
    }]
  });
}

  var values = items.map(function(r){return r.value;});
  charts[id].setOption({
    grid: {left:6, right:50, top:8, bottom:6, containLabel:true},
    tooltip: {trigger:'axis', axisPointer:{type:'shadow'}, confine:true, formatter:function(p){return p[0].name+'<br>'+fmt(p[0].value);}, textStyle:{fontSize:12}},
    xAxis: {type:'value', axisLine:{show:false}, axisTick:{show:false}, splitLine:{lineStyle:{color:'#f5f5f5'}}, axisLabel:{fontSize:10, color:'#999'}},
    yAxis: {type:'category', data:labels.slice().reverse(), axisLine:{show:false}, axisTick:{show:false}, axisLabel:{fontSize:11, color:'#444', interval:0}},
    series: [{
      type:'bar', data:values.slice().reverse(), itemStyle:{color:color, borderRadius:[0,3,3,0]},
      barMaxWidth:18, barCategoryGap:'30%',
      label: {show:true, position:'right', fontSize:10, color:'#666', formatter:function(p){return fmt(p.value);}}
    }]
  });
}
function drawLine(id, labels, values, color, name, tipFmt, axisFmt){
  var dom = document.getElementById(id);
  if(!dom) return;
  if(charts[id]){ try{charts[id].dispose();}catch(e){} }
  charts[id] = echarts.init(dom);
  charts[id].setOption({
    tooltip: {trigger:'axis', confine:true, textStyle:{fontSize:12}, formatter:function(p){
      var v = p[0].value;
      return p[0].axisValue+'<br>'+name+'：'+(v==null?'-':tipFmt(v));
    }},
    grid: {left:36, right:12, top:14, bottom:24},
    xAxis: {type:'category', data:labels, axisLabel:{fontSize:10, interval:Math.max(0, Math.floor(labels.length/6))}, boundaryGap:false, axisLine:{lineStyle:{color:'#ddd'}}},
    yAxis: {type:'value', axisLabel:{fontSize:10, formatter:axisFmt, color:'#999'}, splitLine:{lineStyle:{color:'#f0f0f0'}}, axisLine:{show:false}},
    series: [{
      type:'line', data:values, color:color, smooth:true, symbol:'circle', symbolSize:4,
      lineStyle:{width:2}, connectNulls:false,
      areaStyle:{color:{type:'linear', x:0,y:0,x2:0,y2:1, colorStops:[{offset:0,color:color+'33'},{offset:1,color:color+'00'}]}}
    }]
  });
}
function expandDates(start, end){
  var out = [];
  if(!start || !end) return out;
  var cur = new Date(start+'T00:00:00');
  var stop = new Date(end+'T00:00:00');
  while(cur <= stop){
    out.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

/* ===========================================================
   Resize handler
   =========================================================== */
window.addEventListener('resize', function(){
  Object.keys(charts).forEach(function(k){
    try{ charts[k].resize(); }catch(e){}
  });
});

/* ===========================================================
   Init
   =========================================================== */
loadAllData();
</script>
