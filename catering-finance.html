<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国餐饮可比上市公司财务简况</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d2e;
    --card-hover: #222640;
    --border: #2a2e45;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f59e0b;
    --cyan: #06b6d4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    padding: 48px 20px 24px;
    background: linear-gradient(180deg, #1a1040 0%, var(--bg) 100%);
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: var(--text-dim); font-size: 0.95rem; }
  .container { max-width: 1440px; margin: 0 auto; padding: 0 24px 60px; }

  /* Category Pills */
  .category-bar {
    display: flex; justify-content: center; gap: 8px; margin: 24px 0 12px;
    flex-wrap: wrap;
  }
  .cat-pill {
    padding: 6px 18px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text-dim); cursor: pointer;
    font-size: 0.85rem; transition: all .2s;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-pill.active {
    background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
  }

  /* Tabs */
  .tabs {
    display: flex; justify-content: center; gap: 4px; margin: 20px 0 28px;
    background: var(--card); border-radius: 12px; padding: 4px; width: fit-content;
    margin-left: auto; margin-right: auto;
  }
  .tab {
    padding: 10px 24px; border-radius: 10px; cursor: pointer;
    font-size: 0.9rem; color: var(--text-dim); transition: all .2s;
    border: none; background: transparent;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--accent); color: #fff; font-weight: 600; }

  /* Sort bar */
  .sort-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .sort-bar label { color: var(--text-dim); font-size: 0.85rem; }
  .sort-bar select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 0.85rem; cursor: pointer;
  }

  /* KPI Cards */
  .kpi-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--card); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border);
  }
  .kpi-card .label { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; }
  .kpi-card .value { font-size: 1.6rem; font-weight: 700; }

  /* Company Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px; margin-bottom: 40px;
  }
  .company-card {
    background: var(--card); border-radius: 14px; padding: 22px;
    border: 1px solid var(--border); transition: all .25s;
    cursor: default;
  }
  .company-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,.15); }
  .company-card .name {
    font-size: 1.15rem; font-weight: 700; margin-bottom: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .company-card .tag {
    font-size: 0.65rem; padding: 2px 8px; border-radius: 10px;
    background: rgba(99,102,241,.15); color: var(--accent2);
  }
  .company-card .metrics { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .metric .mlabel { font-size: 0.75rem; color: var(--text-dim); }
  .metric .mval { font-size: 1.05rem; font-weight: 600; }
  .metric .mchange { font-size: 0.75rem; margin-left: 4px; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .na { color: var(--text-dim); }

  .sssg-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  .sssg-row .mlabel { font-size: 0.75rem; color: var(--text-dim); }
  .sssg-row .sssg-text { font-size: 0.82rem; color: var(--text); margin-top: 2px; white-space: pre-line; line-height: 1.5; }

  /* Charts */
  .charts-section { margin-top: 20px; }
  .charts-section h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
  .chart-box {
    background: var(--card); border-radius: 14px; padding: 20px;
    border: 1px solid var(--border);
  }
  .chart-box h3 { font-size: 0.95rem; color: var(--text-dim); margin-bottom: 12px; }
  @media (max-width: 900px) { .chart-grid { grid-template-columns: 1fr; } }
  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 1.4rem; }
    .tabs { flex-wrap: wrap; }
  }

  /* Table View */
  .table-wrap { overflow-x: auto; margin-bottom: 40px; border-radius: 14px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 10px 14px; text-align: right; white-space: nowrap; }
  th { background: #1e2138; color: var(--text-dim); font-weight: 600; position: sticky; top: 0; }
  td { border-top: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; position: sticky; left: 0; background: var(--card); z-index: 1; }
  tr:hover td { background: var(--card-hover); }
  tr:hover td:first-child { background: var(--card-hover); }

  /* View Toggle */
  .view-toggle { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 3px; }
  .view-btn {
    padding: 6px 16px; border-radius: 8px; border: none; background: transparent;
    color: var(--text-dim); cursor: pointer; font-size: 0.82rem; transition: all .2s;
  }
  .view-btn.active { background: var(--accent); color: #fff; }
  #cardView, #tableView { display: none; }
  #cardView.show, #tableView.show { display: block; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <h1>中国餐饮可比上市公司财务简况</h1>
  <p>2025年度各报告期核心财务数据一览</p>
</div>

<div class="container">
  <!-- Category Filter -->
  <div class="category-bar" id="categoryBar"></div>

  <!-- Period Tabs -->
  <div class="tabs" id="periodTabs"></div>

  <!-- KPI Summary -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- Sort + View -->
  <div class="sort-bar">
    <div style="display:flex;gap:12px;align-items:center">
      <label>排序：</label>
      <select id="sortSelect">
        <option value="revenue_desc">营收 高→低</option>
        <option value="revenue_asc">营收 低→高</option>
        <option value="profit_desc">净利润 高→低</option>
        <option value="profit_asc">净利润 低→高</option>
        <option value="margin_desc">净利率 高→低</option>
        <option value="margin_asc">净利率 低→高</option>
      </select>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" data-view="card">卡片</button>
      <button class="view-btn" data-view="table">表格</button>
    </div>
  </div>

  <!-- Card View -->
  <div id="cardView" class="show">
    <div class="grid" id="companyGrid"></div>
  </div>

  <!-- Table View -->
  <div id="tableView">
    <div class="table-wrap"><table id="dataTable"></table></div>
  </div>

  <!-- Charts -->
  <div class="charts-section">
    <h2>可视化对比</h2>
    <div class="chart-grid">
      <div class="chart-box"><h3>营业收入（亿元）</h3><canvas id="chartRevenue"></canvas></div>
      <div class="chart-box"><h3>净利润（亿元）</h3><canvas id="chartProfit"></canvas></div>
      <div class="chart-box"><h3>毛利率</h3><canvas id="chartGross"></canvas></div>
      <div class="chart-box"><h3>净利率</h3><canvas id="chartNet"></canvas></div>
    </div>
  </div>
</div>

    { name:'霸王茶姬', cat:'咖啡茶饮', revenue:129.10, revGrowth:0.040, profit:19.10, profGrowth:-0.240, gross:0.535, net:0.14795, sssg:'Q4: -25.5%', stores:null, turnover:null, avgSpend:null },
    { name:'沪上阿姨', cat:'咖啡茶饮', revenue:44.66, revGrowth:0.360, profit:8.21, profGrowth:0.524, gross:0.314, net:0.18383, sssg:null, stores:null, turnover:null, avgSpend:null },
    { name:'茶百道', cat:'咖啡茶饮', revenue:53.95, revGrowth:0.097, profit:8.21, profGrowth:0.712, gross:0.325, net:0.15218, sssg:null, stores:null, turnover:null, avgSpend:null },
    { name:'古茗', cat:'咖啡茶饮', revenue:129.14, revGrowth:0.469, profit:31.10, profGrowth:1.083, gross:0.330, net:0.24082, sssg:null, stores:null, turnover:null, avgSpend:null },
  ]
};

const periodLabels = { 'H1':'2025年H1（半年报）', 'FY':'2025年Q1-Q4（全年）' };

let currentPeriod = 'H1';
let currentCategory = '全部';
let currentSort = 'revenue_desc';
let charts = {};

// ========== RENDER ==========

function init() {
  renderCategoryBar();
  renderPeriodTabs();
  document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; render(); });
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cardView').classList.toggle('show', btn.dataset.view === 'card');
      document.getElementById('tableView').classList.toggle('show', btn.dataset.view === 'table');
    });
  });
  render();
}

function renderCategoryBar() {
  const bar = document.getElementById('categoryBar');
  bar.innerHTML = '';
  Object.keys(categories).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-pill' + (cat === currentCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => { currentCategory = cat; document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    bar.appendChild(btn);
  });
}

function renderPeriodTabs() {
  const tabs = document.getElementById('periodTabs');
  tabs.innerHTML = '';
  Object.entries(periodLabels).forEach(([key, label]) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (key === currentPeriod ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => { currentPeriod = key; document.querySelectorAll('.tab').forEach(b => b.classList.remove('active')); btn.classList.add('active'); render(); };
    tabs.appendChild(btn);
  });
}

function getFiltered() {
  let items = [...(data[currentPeriod] || [])];
  if (currentCategory !== '全部') {
    const allowed = categories[currentCategory];
    if (allowed) items = items.filter(d => allowed.includes(d.name));
  }
  const [field, dir] = currentSort.split('_');
  const key = field === 'revenue' ? 'revenue' : field === 'profit' ? 'profit' : 'net';
  items.sort((a, b) => dir === 'desc' ? (b[key]||0) - (a[key]||0) : (a[key]||0) - (b[key]||0));
  return items;
}

function fmtPct(v) { return v == null ? '—' : (v * 100).toFixed(1) + '%'; }
function fmtNum(v) { return v == null ? '—' : v.toFixed(2); }
function fmtGrowth(v) {
  if (v == null) return '<span class="na">—</span>';
  const pct = (v * 100).toFixed(1) + '%';
  if (v > 0) return `<span class="up">+${pct}</span>`;
  if (v < 0) return `<span class="down">${pct}</span>`;
  return `<span class="na">${pct}</span>`;
}

function render() {
  const items = getFiltered();
  renderKPIs(items);
  renderCards(items);
  renderTable(items);
  renderCharts(items);
}

function renderKPIs(items) {
  const row = document.getElementById('kpiRow');
  const totalRev = items.reduce((s, d) => s + (d.revenue || 0), 0);
  const totalProfit = items.reduce((s, d) => s + (d.profit || 0), 0);
  const avgGross = items.filter(d => d.gross != null).reduce((s, d, _, a) => s + d.gross / a.length, 0);
  const avgNet = items.filter(d => d.net != null).reduce((s, d, _, a) => s + d.net / a.length, 0);
  row.innerHTML = `
    <div class="kpi-card"><div class="label">公司数量</div><div class="value">${items.length}</div></div>
    <div class="kpi-card"><div class="label">总营收（亿元）</div><div class="value">${totalRev.toFixed(1)}</div></div>
    <div class="kpi-card"><div class="label">总净利润（亿元）</div><div class="value" style="color:${totalProfit>=0?'var(--green)':'var(--red)'}">${totalProfit.toFixed(1)}</div></div>
    <div class="kpi-card"><div class="label">平均毛利率</div><div class="value">${(avgGross*100).toFixed(1)}%</div></div>
    <div class="kpi-card"><div class="label">平均净利率</div><div class="value">${(avgNet*100).toFixed(1)}%</div></div>
  `;
}

function renderCards(items) {
  const grid = document.getElementById('companyGrid');
  grid.innerHTML = items.map(d => `
    <div class="company-card">
      <div class="name">${d.name} <span class="tag">${d.cat}</span></div>
      <div class="metrics">
        <div class="metric">
          <div class="mlabel">营业收入（亿元）</div>
          <div class="mval">${fmtNum(d.revenue)} ${fmtGrowth(d.revGrowth)}</div>
        </div>
        <div class="metric">
          <div class="mlabel">净利润（亿元）</div>
          <div class="mval" style="color:${d.profit!=null&&d.profit<0?'var(--red)':'var(--text)'}">${fmtNum(d.profit)} ${fmtGrowth(d.profGrowth)}</div>
        </div>
        <div class="metric">
          <div class="mlabel">毛利率</div>
          <div class="mval">${fmtPct(d.gross)}</div>
        </div>
        <div class="metric">
          <div class="mlabel">净利率</div>
          <div class="mval" style="color:${d.net!=null&&d.net<0?'var(--red)':'var(--text)'}">${fmtPct(d.net)}</div>
        </div>
        <div class="metric">
          <div class="mlabel">门店数量</div>
          <div class="mval">${d.stores != null ? d.stores.toLocaleString() : '—'}</div>
        </div>
        <div class="metric">
          <div class="mlabel">翻台率（次/日）</div>
          <div class="mval">${d.turnover != null ? d.turnover : '—'}</div>
        </div>
        <div class="metric">
          <div class="mlabel">人均消费（元）</div>
          <div class="mval">${d.avgSpend != null ? d.avgSpend : '—'}</div>
        </div>
      </div>
      ${d.sssg ? `<div class="sssg-row"><div class="mlabel">同店增长</div><div class="sssg-text">${d.sssg}</div></div>` : ''}
    </div>
  `).join('');
}

function renderTable(items) {
  const table = document.getElementById('dataTable');
  table.innerHTML = `
    <thead><tr>
      <th>公司</th><th>类别</th><th>营收（亿）</th><th>营收增速</th>
      <th>净利润（亿）</th><th>利润增速</th><th>毛利率</th><th>净利率</th><th>门店</th><th>翻台率</th><th>人均消费</th><th>同店增长</th>
    </tr></thead>
    <tbody>${items.map(d => `<tr>
      <td style="font-weight:600">${d.name}</td>
      <td>${d.cat}</td>
      <td>${fmtNum(d.revenue)}</td>
      <td>${fmtGrowth(d.revGrowth)}</td>
      <td style="color:${d.profit!=null&&d.profit<0?'var(--red)':'var(--text)'}">${fmtNum(d.profit)}</td>
      <td>${fmtGrowth(d.profGrowth)}</td>
      <td>${fmtPct(d.gross)}</td>
      <td style="color:${d.net!=null&&d.net<0?'var(--red)':'var(--text)'}">${fmtPct(d.net)}</td>
      <td>${d.stores != null ? d.stores.toLocaleString() : '—'}</td>
      <td>${d.turnover != null ? d.turnover : '—'}</td>
      <td>${d.avgSpend != null ? d.avgSpend : '—'}</td>
      <td style="font-size:0.8rem;white-space:pre-line;text-align:left">${d.sssg || '—'}</td>
    </tr>`).join('')}</tbody>
  `;
}

function renderCharts(items) {
  const colors = ['#6366f1','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6','#fb7185',
    '#f59e0b','#22c55e','#06b6d4','#3b82f6','#8b5cf6','#ec4899','#14b8a6','#eab308','#f97316','#84cc16','#64748b'];
  const labels = items.map(d => d.name);
  const bgColors = items.map((_, i) => colors[i % colors.length]);

  const opts = (unit) => ({
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: { label: ctx => ctx.parsed.x != null ? ctx.parsed.x.toFixed(2) + (unit||'') : '' }
      }
    },
    scales: {
      x: { grid: { color: '#2a2e45' }, ticks: { color: '#8b8fa3', font: { size: 11 } } },
      y: { grid: { display: false }, ticks: { color: '#e4e6f0', font: { size: 12 } } }
    }
  });

  const h = Math.max(300, items.length * 36);
  document.querySelectorAll('.chart-box canvas').forEach(c => { c.parentElement.style.height = h + 'px'; });

  ['chartRevenue','chartProfit','chartGross','chartNet'].forEach(id => { if (charts[id]) charts[id].destroy(); });

  charts.chartRevenue = new Chart(document.getElementById('chartRevenue'), {
    type: 'bar', data: { labels, datasets: [{ data: items.map(d=>d.revenue), backgroundColor: bgColors, borderRadius: 4 }] },
    options: { ...opts(' 亿元'), plugins: { ...opts().plugins } }
  });
  charts.chartProfit = new Chart(document.getElementById('chartProfit'), {
    type: 'bar', data: { labels, datasets: [{ data: items.map(d=>d.profit), backgroundColor: items.map((d,i) => d.profit<0 ? '#ef4444' : bgColors[i]), borderRadius: 4 }] },
    options: { ...opts(' 亿元'), plugins: { ...opts().plugins } }
  });
  charts.chartGross = new Chart(document.getElementById('chartGross'), {
    type: 'bar', data: { labels, datasets: [{ data: items.map(d=> d.gross!=null ? +(d.gross*100).toFixed(1) : 0), backgroundColor: bgColors, borderRadius: 4 }] },
    options: { ...opts('%'), plugins: { ...opts().plugins } }
  });
  charts.chartNet = new Chart(document.getElementById('chartNet'), {
    type: 'bar', data: { labels, datasets: [{ data: items.map(d=> d.net!=null ? +(d.net*100).toFixed(1) : 0), backgroundColor: items.map((d,i) => d.net<0 ? '#ef4444' : bgColors[i]), borderRadius: 4 }] },
    options: { ...opts('%'), plugins: { ...opts().plugins } }
  });
}

init();
</script>
</body>
</html>
